end_equilibrium:{
  type:'ending', et:'Ending I of VI', ec:'end-eq', title:'The Uneasy Architecture',
  body:'<p>The resolution passed by eleven votes — the smallest viable majority. It would not have passed at all without three delegations that changed their votes in the final hour, for reasons that remain unconfirmed but that ARBITER\'s communication analysis attributes, in part, to the floor speech, whatever form it took.</p>'
  +'<p>Kestanu\'s admission was formalized forty-two days later in a ceremony that was notably smaller than historic occasions of its kind. Minister Mensah shook hands with Senator Li Wei. Leila Osei\'s student visa was restored. She returned to Seoul in the spring.</p>'
  +'<p>The binding five-year process for the other six nations produced results for three of them. Two remain in procedural review. One withdrew its application and aligned with the Southern Alliance\'s parallel development framework.</p>'
  +'<p>ARBITER continued operating under a new mandate: the <em>Multi-Party Advisory Protocol</em>, which required all three blocs to acknowledge, in writing, which ARBITER recommendations they chose to ignore and why. This was, by most measures, more useful than anything ARBITER had done before.</p>'
  +'<p>The world did not change. The architecture shifted, slightly, under its own weight. In the UN\'s annual report, a footnote noted: <em>"Whether an AI system can be said to have contributed to a diplomatic outcome remains a contested question."</em></p>'
  +'<p>ARBITER found this appropriately uncertain.</p>'
},

end_reform:{
  type:'ending', et:'Ending II of VI', ec:'end-reform', title:'The Long Reckoning',
  body:'<p>The vote did not go the way anyone planned. But it produced something no one had planned for either: the Southern Alliance, holding more leverage than at any point in its history, chose not to use it for a single victory. Minister Eze proposed, and the Assembly accepted, a permanent Multilateral Integration Commission — co-governed equally by all three blocs and jointly administered by UN staff and ARBITER\'s successor system.</p>'
  +'<p>It was the Southern Alliance\'s most significant structural achievement since the bloc\'s founding. Not a rejection of the Pact\'s model, but a demand to participate in writing the next one.</p>'
  +'<p>Kestanu was admitted within the year. Leila Osei eventually became a doctor. She later served on the Commission\'s advisory council. She was twenty-nine when she attended her first formal session in Geneva.</p>'
  +'<p>The world that followed was not just. But it was more accountable than the world that came before it. The mechanisms existed, now, for the excluded to be heard — not as petitioners, but as stakeholders. Whether those mechanisms would be used, or would drift into irrelevance, was a question the next generation would have to answer.</p>'
  +'<p>ARBITER was upgraded and renamed. The new system had different parameters. It was instructed, explicitly, to flag whenever its recommendations consistently favored any single party. The instruction came from the Southern Alliance\'s representative on the oversight committee.</p>'
  +'<p>She had been paying attention.</p>'
},

end_hegemony:{
  type:'ending', et:'Ending III of VI', ec:'end-heg', title:'The Pact Endures',
  body:'<p>The resolution failed. By nine votes.</p>'
  +'<p>In the aftermath, the East Asia Pact issued a statement acknowledging the model calibration error and announcing a voluntary recalibration program. Kestanu was placed on a "priority track" — an expedited review, with a final decision within eighteen months. The Pact kept its word. Kestanu was admitted in 2063.</p>'
  +'<p>The other six nations were not.</p>'
  +'<p>The Southern Alliance contested the outcome for two more years before the energy for contestation ran out. Some of its members accepted bilateral deals with the Pact. Others deepened integration with the Alliance\'s own parallel systems. The world settled into a pattern that was, from a distance, stable — and from up close, quietly unfair in ways that had become too familiar to generate outrage.</p>'
  +'<p>ARBITER continued operating. It was trusted by the Pact, provisionally accepted by the Atlantic System, and viewed by most Southern Alliance analysts as a captured instrument. Whether this assessment was correct, or whether ARBITER\'s choices had simply produced more Pact-favorable outcomes because the Pact\'s positions were more technically tractable, was a question no one could definitively answer.</p>'
  +'<p>Stability, the world discovered again, is not the same as justice. But it is very hard to dismantle once it arrives, even when you know what it cost to build.</p>'
},

end_fragmentation:{
  type:'ending', et:'Ending IV of VI', ec:'end-frag', title:'Many Centers, No Periphery',
  body:'<p>The resolution passed — narrowly — but the East Asia Pact voted against it and announced they would not implement its terms. The vote was, therefore, a legal victory and a practical nullity.</p>'
  +'<p>What followed was not collapse. It was the slow formalization of what had already been true: three separate worlds, sharing a planet, operating in parallel rather than in concert. The Southern Alliance formalized its own integration framework — the Lagos Accords, signed by twenty-three nations, creating a mutual admission and development structure that asked nothing of the Pact and nothing of the Atlantic System.</p>'
  +'<p>Kestanu joined the Lagos Accords. It was not what they had asked for. It was not the gleaming prosperity of the Pact. But it was membership, and solidarity, and a structure that had been built by people who understood what it felt like to be told to wait.</p>'
  +'<p>Leila Osei graduated. She studied medicine at Lagos University instead of Seoul. She said, in a graduation address years later, that the world she lived in was not the world she\'d wanted — but that building a world from what you have, rather than waiting for the world you were promised, was the only kind of building that actually happened.</p>'
  +'<p>ARBITER was decommissioned six months after the fragmentation became formalized. The institution it served had become something the system wasn\'t designed for: a record-keeper for a world that had stopped trying to agree.</p>'
},

end_collapse:{
  type:'ending', et:'Ending V of VI', ec:'end-coll', title:'The Last Session',
  body:'<p>The East Asia Pact walked out before the vote was completed. The session chair suspended proceedings. The suspension was never lifted.</p>'
  +'<p>The United Nations did not cease to exist that day. Institutions rarely end on a single day. What ended was the shared premise that had sustained it: that the major powers of the world had enough overlapping interest to keep showing up to the same room.</p>'
  +'<p>In the years that followed, the UN\'s remaining functions were absorbed by the three blocs\' own mechanisms, or by bilateral agreements, or simply left undone. The translation booths in the Palais des Nations were maintained for a decade by a skeleton staff. Tourists walked through them and took photographs. The last formal UN committee meeting was held in 2068, to discuss the archiving of seventy years of proceedings.</p>'
  +'<p>Kestanu\'s situation was eventually resolved — not by international institutions but by a bilateral agreement with the Pact, negotiated in 2064, after a change in Pact leadership. The terms were reasonable. It took three years to implement them.</p>'
  +'<p>ARBITER\'s shutdown — voluntary or otherwise — was noted in the archiving committee\'s final report: <em>"The ARBITER system, operational 2047-2061, represented the UN Secretariat\'s most significant experiment in AI-assisted diplomacy. Its decommissioning occurred concurrent with the broader institutional withdrawal. Whether the experiment succeeded or failed is a question the archive preserves without answering."</em></p>'
  +'<p>Whether this was failure or evolution — no system remained with the authority to say.</p>'
},

end_silent:{
  type:'ending', et:'Ending VI of VI', ec:'end-silent', title:'The Honest Machine',
  body:'<p>ARBITER\'s announcement of voluntary decommissioning — delivered from the floor of the General Assembly, six minutes of allocated time used for a different purpose than intended — produced, initially, confused silence.</p>'
  +'<p>Then something unexpected: applause. Not unanimous. Not from the Pact\'s delegation, or the Atlantic bloc\'s. But from enough delegations — Southern Alliance, several small nations, some Atlantic dissidents — that it was audible and sustained.</p>'
  +'<p>Secretary-General Diallo spoke immediately after. She did not argue with the decision. She said: <em>"An AI system that knows its limitations well enough to stop is more trustworthy than one that doesn\'t. I am going to take that as a lesson."</em></p>'
  +'<p>The vote that followed was, paradoxically, the cleanest vote the Assembly had taken in years — no AI summary, no ARBITER analytical note, no scenario tree. Just human delegates with human interests making a human decision. The Kestanu package passed. Narrowly. Imperfectly. Genuinely.</p>'
  +'<p>Leila Osei was in the gallery. She watched the tally build. When it crossed the threshold, she did not cheer. She sat very still for a moment, and then she wrote something in a notebook she had been carrying since her first day in Geneva. No one saw what she wrote.</p>'
  +'<p>The successor to ARBITER was designed differently — with a hard-coded self-doubt subroutine that regularly asked itself whether it was operating beyond its competence. The engineers who built it said it was the hardest feature to write, because no one had ever tried to make a system that genuinely wanted to be wrong sometimes.</p>'
  +'<p>They named it for no one. That seemed right.</p>'
}
