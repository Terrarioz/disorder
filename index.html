<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISORDER — A Civilizational Decision Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070b12; --bg2:#0c1220; --bg3:#101828; --panel:#0d1725;
  --border:#1c2d45; --border-hi:#2a4468;
  --text:#bdd0e8; --text-dim:#527090; --text-muted:#304860;
  --amber:#cc8a22; --amber-hi:#eeaa38; --amber-lo:#6e400c;
  --red:#b83428; --red-lo:#5a1810;
  --white:#dceaf8;
  --east:#b89840; --south:#50a850; --atl:#4080c0; --un:#7860a8;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.022) 2px,rgba(0,0,0,.022) 4px);pointer-events:none;z-index:9998;}

/* ── LAYOUT ─────────────────── */
#wrap{max-width:900px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);margin-bottom:6px;}
.hdr-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;letter-spacing:.35em;color:var(--amber);text-transform:uppercase;}
.hdr-status{display:flex;gap:18px;font-size:.62rem;color:var(--text-dim);letter-spacing:.1em;}
.hdr-status span{color:var(--amber-hi);}

/* ── TRUST BARS ─────────────── */
#trust-panel{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:18px;}
.ti{display:flex;flex-direction:column;gap:3px;}
.ti-lbl{font-size:.55rem;letter-spacing:.08em;color:var(--text-dim);text-transform:uppercase;}
.ti-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.ti-fill{height:100%;border-radius:2px;transition:width .7s ease;}
.ti-val{font-size:.58rem;color:var(--text-muted);}

/* ── PROGRESS ───────────────── */
.prog-track{display:flex;gap:3px;padding:10px 0 6px;}
.pd{flex:1;height:3px;background:var(--border);transition:background .4s;}
.pd.done{background:var(--amber-lo);}
.pd.active{background:var(--amber);}

/* ── SCENE ──────────────────── */
.scene{flex:1;display:flex;flex-direction:column;animation:fadeUp .55s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
.ch-lbl{font-size:.58rem;letter-spacing:.28em;color:var(--amber-lo);text-transform:uppercase;padding-bottom:7px;}
.sc-title{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:900;color:var(--white);line-height:1.2;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:18px;}
.loc{display:inline-flex;align-items:center;gap:5px;font-size:.58rem;letter-spacing:.14em;color:var(--text-dim);padding:3px 9px;border:1px solid var(--border);background:var(--bg3);margin-bottom:14px;text-transform:uppercase;}
.loc::before{content:'◈';color:var(--amber-lo);}
.prev-con{padding:10px 14px;border:1px solid var(--border);background:var(--bg3);font-size:.68rem;color:var(--text-dim);margin-bottom:14px;animation:fadeUp .4s ease;}
.prev-con .icon{color:var(--amber);margin-right:5px;}

/* ── NARRATIVE ──────────────── */
.narr{font-family:'EB Garamond',serif;font-size:1.04rem;line-height:1.88;color:var(--text);padding:0 0 20px;}
.narr p{margin-bottom:.9em;}
.narr em{color:var(--amber-hi);font-style:italic;}
.narr strong{color:var(--white);font-weight:600;}

/* ── INTEL BLOCK ────────────── */
.intel{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--amber-lo);padding:13px 16px;margin:14px 0;font-size:.76rem;line-height:1.72;color:var(--text-dim);}
.intel .ih{font-size:.56rem;letter-spacing:.2em;color:var(--amber);text-transform:uppercase;margin-bottom:7px;}
.intel.s{border-left-color:var(--south);}  .intel.s .ih{color:var(--south);}
.intel.a{border-left-color:var(--atl);}   .intel.a .ih{color:var(--atl);}
.intel.e{border-left-color:var(--east);}  .intel.e .ih{color:var(--east);}
.intel.u{border-left-color:var(--un);}    .intel.u .ih{color:var(--un);}

/* ── FACTION QUOTE ──────────── */
.fq{padding:14px 18px;margin:14px 0;border:1px solid var(--border);background:var(--panel);position:relative;}
.fq::before{content:'"';position:absolute;top:-9px;left:10px;font-family:'Playfair Display',serif;font-size:2.6rem;color:var(--amber-lo);line-height:1;}
.fq .qt{font-family:'EB Garamond',serif;font-size:.97rem;font-style:italic;color:var(--text);line-height:1.72;padding-left:7px;}
.fq .qa{font-size:.58rem;letter-spacing:.13em;color:var(--text-dim);margin-top:9px;text-transform:uppercase;padding-left:7px;}
.fq.fe .qa{color:var(--east);}  .fq.fs .qa{color:var(--south);}
.fq.fa .qa{color:var(--atl);}   .fq.fu .qa{color:var(--un);}

/* ── CHOICES ────────────────── */
.choices{margin-top:24px;}
.choices-hdr{font-size:.56rem;letter-spacing:.24em;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.choices-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
.cbtn{display:block;width:100%;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:14px 18px;margin-bottom:9px;cursor:pointer;text-align:left;transition:all .2s ease;position:relative;overflow:hidden;font-family:'EB Garamond',serif;font-size:.97rem;line-height:1.5;}
.cbtn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border-hi);transition:all .2s;}
.cbtn:hover{background:var(--bg3);border-color:var(--border-hi);color:var(--white);transform:translateX(2px);}
.cbtn:hover::before{background:var(--amber);width:4px;}
.ctag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:.53rem;letter-spacing:.14em;padding:2px 5px;margin-bottom:5px;text-transform:uppercase;border:1px solid;}
.t-e{color:var(--east);border-color:var(--east);background:rgba(184,152,64,.07);}
.t-s{color:var(--south);border-color:var(--south);background:rgba(80,168,80,.07);}
.t-a{color:var(--atl);border-color:var(--atl);background:rgba(64,128,192,.07);}
.t-n{color:var(--un);border-color:var(--un);background:rgba(120,96,168,.07);}
.t-r{color:var(--red);border-color:var(--red);background:rgba(184,52,40,.07);}
.ccon{display:block;font-family:'IBM Plex Mono',monospace;font-size:.56rem;color:var(--text-muted);margin-top:5px;}

.scroll-hint{font-size:.58rem;letter-spacing:.18em;color:var(--text-muted);text-align:center;padding-top:6px;animation:pulse 2.2s ease infinite;}
@keyframes pulse{0%,100%{opacity:.35;}50%{opacity:.9;}}

/* ── TITLE SCREEN ───────────── */
.title-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:50px 20px 30px;}
.t-eye{font-size:.6rem;letter-spacing:.5em;color:var(--amber-lo);text-transform:uppercase;margin-bottom:18px;}
.t-main{font-family:'Playfair Display',serif;font-size:5.5rem;font-weight:900;color:var(--white);letter-spacing:-.02em;line-height:1;margin-bottom:6px;text-shadow:0 0 80px rgba(200,160,60,.12);}
.t-sub{font-family:'EB Garamond',serif;font-size:1.05rem;color:var(--text-dim);font-style:italic;margin-bottom:38px;}
.t-div{width:110px;height:1px;background:linear-gradient(90deg,transparent,var(--amber-lo),transparent);margin:0 auto 38px;}
.t-intro{font-family:'EB Garamond',serif;font-size:.98rem;line-height:1.82;color:var(--text-dim);max-width:540px;margin-bottom:36px;}
.t-badges{display:flex;gap:14px;justify-content:center;margin-bottom:44px;flex-wrap:wrap;}
.t-badge{padding:7px 15px;border:1px solid;font-size:.58rem;letter-spacing:.13em;text-transform:uppercase;}
.be{border-color:var(--east);color:var(--east);} .bs{border-color:var(--south);color:var(--south);}
.ba{border-color:var(--atl);color:var(--atl);}   .bu{border-color:var(--un);color:var(--un);}
.t-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.btn-primary{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;padding:14px 44px;border:1px solid var(--amber);background:transparent;color:var(--amber-hi);cursor:pointer;transition:all .28s;}
.btn-primary:hover{background:var(--amber-lo);color:var(--white);}
.btn-secondary{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;padding:14px 28px;border:1px solid var(--border-hi);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .28s;}
.btn-secondary:hover{border-color:var(--amber-lo);color:var(--text);}
.blink{animation:blink 1.4s step-end infinite;}
@keyframes blink{50%{opacity:0;}}

/* ── WORLD BRIEFING ─────────── */
.briefing-screen{flex:1;padding:0 0 40px;animation:fadeUp .6s ease;}
.brief-hdr{text-align:center;padding:40px 0 30px;border-bottom:1px solid var(--border);margin-bottom:30px;}
.brief-eye{font-size:.6rem;letter-spacing:.4em;color:var(--amber-lo);text-transform:uppercase;margin-bottom:14px;}
.brief-title{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;color:var(--white);margin-bottom:10px;}
.brief-sub{font-family:'EB Garamond',serif;font-size:1rem;color:var(--text-dim);font-style:italic;}
.brief-section{margin-bottom:36px;}
.brief-section-title{font-size:.62rem;letter-spacing:.3em;color:var(--amber);text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.brief-section-title::before{content:'';width:8px;height:8px;border:1px solid var(--amber);transform:rotate(45deg);display:inline-block;flex-shrink:0;}
.brief-body{font-family:'EB Garamond',serif;font-size:1rem;line-height:1.85;color:var(--text);}
.brief-body p{margin-bottom:.9em;}
.brief-body em{color:var(--amber-hi);font-style:italic;}
.brief-body strong{color:var(--white);}
.faction-card{border:1px solid var(--border);background:var(--panel);padding:18px 20px;margin-bottom:14px;position:relative;overflow:hidden;}
.faction-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.fc-east::before{background:var(--east);}  .fc-south::before{background:var(--south);}
.fc-atl::before{background:var(--atl);}    .fc-un::before{background:var(--un);}
.fc-name{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px;font-family:'IBM Plex Mono',monospace;}
.fc-east .fc-name{color:var(--east);}  .fc-south .fc-name{color:var(--south);}
.fc-atl .fc-name{color:var(--atl);}    .fc-un .fc-name{color:var(--un);}
.fc-desc{font-family:'EB Garamond',serif;font-size:.97rem;line-height:1.78;color:var(--text-dim);}
.fc-desc strong{color:var(--text);}
.fc-tags{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap;}
.fc-tag{font-size:.54rem;letter-spacing:.1em;padding:2px 7px;border:1px solid var(--border);color:var(--text-muted);text-transform:uppercase;}
.timeline-item{display:flex;gap:16px;margin-bottom:14px;align-items:flex-start;}
.tl-year{font-size:.6rem;letter-spacing:.1em;color:var(--amber);white-space:nowrap;padding-top:2px;min-width:42px;}
.tl-dot{width:8px;height:8px;border:1px solid var(--amber-lo);transform:rotate(45deg);margin-top:4px;flex-shrink:0;}
.tl-text{font-family:'EB Garamond',serif;font-size:.95rem;line-height:1.7;color:var(--text-dim);}
.brief-footer{text-align:center;padding-top:24px;border-top:1px solid var(--border);}
.arbiter-card{background:var(--bg3);border:1px solid var(--border);padding:20px 24px;margin-bottom:28px;text-align:left;}
.ac-title{font-size:.6rem;letter-spacing:.25em;color:var(--un);text-transform:uppercase;margin-bottom:10px;}
.ac-body{font-family:'EB Garamond',serif;font-size:.97rem;line-height:1.8;color:var(--text-dim);}
.ac-body strong{color:var(--text);}

/* ── ENDING ─────────────────── */
.ending-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;animation:fadeUp .9s ease;}
.end-type{font-size:.62rem;letter-spacing:.4em;color:var(--text-muted);text-transform:uppercase;margin-bottom:14px;}
.end-title{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:900;line-height:1.15;margin-bottom:22px;}
.end-div{width:70px;height:1px;background:var(--amber-lo);margin:0 auto 26px;}
.end-narr{font-family:'EB Garamond',serif;font-size:1.02rem;line-height:1.88;color:var(--text);max-width:620px;margin:0 auto 30px;text-align:left;}
.end-narr p{margin-bottom:.9em;}
.end-narr em{color:var(--amber-hi);font-style:italic;}
.end-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:500px;margin:0 auto 20px;}
.es{padding:11px;border:1px solid var(--border);background:var(--panel);}
.es-lbl{font-size:.52rem;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;margin-bottom:5px;}
.es-val{font-size:1.28rem;font-weight:700;}
.end-meta{font-size:.62rem;color:var(--text-muted);margin-bottom:22px;letter-spacing:.1em;}
.end-meta span{color:var(--amber-hi);}
.restart-btn{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;padding:13px 30px;border:1px solid var(--amber-lo);background:transparent;color:var(--amber);cursor:pointer;transition:all .2s;}
.restart-btn:hover{background:var(--amber-lo);color:var(--white);}
.end-eq .end-title{color:var(--un);}
.end-frag .end-title{color:var(--text-dim);}
.end-heg .end-title{color:var(--east);}
.end-coll .end-title{color:var(--red);}
.end-reform .end-title{color:var(--south);}
.end-silent .end-title{color:#8090a0;}
</style>
</head>
<body>
<div id="wrap">
  <div class="hdr">
    <div class="hdr-title">DISORDER</div>
    <div class="hdr-status">
      <div>NODE <span id="h-node">—</span></div>
      <div>YEAR <span>2061</span></div>
      <div>SYS <span id="h-sys">STANDBY</span></div>
    </div>
  </div>
  <div id="trust-panel" style="display:none">
    <div class="ti"><div class="ti-lbl">East Asia Pact</div><div class="ti-bg"><div class="ti-fill" id="bf-e" style="width:50%;background:var(--east)"></div></div><div class="ti-val" id="bv-e">50</div></div>
    <div class="ti"><div class="ti-lbl">Southern Alliance</div><div class="ti-bg"><div class="ti-fill" id="bf-s" style="width:50%;background:var(--south)"></div></div><div class="ti-val" id="bv-s">50</div></div>
    <div class="ti"><div class="ti-lbl">Atlantic System</div><div class="ti-bg"><div class="ti-fill" id="bf-a" style="width:50%;background:var(--atl)"></div></div><div class="ti-val" id="bv-a">50</div></div>
    <div class="ti"><div class="ti-lbl">UN Authority</div><div class="ti-bg"><div class="ti-fill" id="bf-u" style="width:50%;background:var(--un)"></div></div><div class="ti-val" id="bv-u">50</div></div>
  </div>
  <div id="main"></div>
</div>

<script>
// ═══════════════════ STATE ════════════════
var G = { trust:{e:50,s:50,a:50,u:50}, ch:0, flags:{}, hist:[] };
function adj(e,s,a,u){ ['e','s','a','u'].forEach(function(k,i){ var d=[e,s,a,u][i]||0; G.trust[k]=Math.max(0,Math.min(100,G.trust[k]+d)); }); updateUI(); }
function updateUI(){ ['e','s','a','u'].forEach(function(k){ document.getElementById('bf-'+k).style.width=G.trust[k]+'%'; document.getElementById('bv-'+k).textContent=G.trust[k]; }); }
function flag(k,v){ G.flags[k]=v; }
function gf(k){ return G.flags[k]; }

function go(id){
  G.hist.push(id); G.ch=Math.min(G.ch+1,8);
  document.getElementById('h-node').textContent=id.toUpperCase().replace(/_/g,' ');
  document.getElementById('h-sys').textContent='ACTIVE';
  paint(id); window.scrollTo({top:0,behavior:'smooth'});
}

// ═══════════════════ CHAPTERS ════════════
var CHAPS=['Prologue','Chapter I','Chapter II','Chapter III','Chapter IV','Chapter V','Chapter VI','Chapter VII'];

function dots(ch){
  var idx=CHAPS.findIndex(function(c){ return ch&&ch.indexOf(c)===0; });
  if(idx<0) idx=0;
  return CHAPS.map(function(_,i){ var c=i<idx?'done':i===idx?'active':''; return '<div class="pd '+c+'"></div>'; }).join('');
}

function paint(id){
  var N=NODES[id]; if(!N) return;
  var el=document.getElementById('main');
  var tp=document.getElementById('trust-panel');
  if(N.type==='title'){ tp.style.display='none'; el.innerHTML=renderTitle(); return; }
  if(N.type==='briefing'){ tp.style.display='none'; el.innerHTML=renderBriefing(); return; }
  if(N.type==='ending'){ tp.style.display='none'; el.innerHTML=renderEnding(N); return; }
  tp.style.display='grid';
  var prev=N.prev?'<div class="prev-con"><span class="icon">▸</span>'+N.prev+'</div>':'';
  var ch='<div class="choices"><div class="choices-hdr">Directive Input Required</div>';
  (N.choices||[]).forEach(function(c,i){
    ch+='<button class="cbtn" onclick="choose('+i+',\''+id+'\')">'
      +'<span class="ctag t-'+c.tag+'">'+c.tl+'</span><br>'+c.text
      +'<span class="ccon">↳ '+c.con+'</span></button>';
  });
  ch+='</div>';
  el.innerHTML='<div class="scene"><div class="prog-track">'+dots(N.ch)+'</div>'
    +prev+'<div class="ch-lbl">'+(N.ch||'')+'</div>'
    +'<div class="sc-title">'+N.title+'</div>'
    +(N.loc?'<div class="loc">'+N.loc+'</div>':'')
    +( N.bodyFn ? N.bodyFn() : N.body )+ch+'<div class="scroll-hint">scroll to read ↓</div></div>';
}

function choose(i,id){ var c=(NODES[id].choices||[])[i]; if(c&&c.go) c.go(); }

function renderTitle(){
  return '<div class="title-screen">'
    +'<div class="t-eye">A Civilizational Decision Game · 2061</div>'
    +'<div class="t-main">DISORDER</div>'
    +'<div class="t-sub">When order fails, what remains?</div>'
    +'<div class="t-div"></div>'
    +'<div class="t-intro">The United Nations still stands. Its lights still burn, its translators still work, its chambers still fill. But something essential has drained away — the belief that a single room can contain the world\'s disagreements.<br><br>You are <strong>ARBITER</strong>. An AI advisory system. The most sophisticated decision-support tool the UN has ever deployed. You wake into a crisis that may define the century — or end an era.</div>'
    +'<div class="t-badges"><div class="t-badge be">Great East Asia Pact</div><div class="t-badge bs">Pan-Southern Alliance</div><div class="t-badge ba">Atlantic System</div><div class="t-badge bu">United Nations</div></div>'
    +'<div class="t-btns">'
    +'<button class="btn-secondary" onclick="go(\'briefing\')">◈ WORLD BRIEFING</button>'
    +'<button class="btn-primary" onclick="go(\'ch0_boot\')">INITIALIZE ARBITER <span class="blink">_</span></button>'
    +'</div></div>';
}

function renderBriefing(){
  return '<div class="briefing-screen">'
  +'<div class="brief-hdr"><div class="brief-eye">Intelligence Dossier · Eyes Only</div><div class="brief-title">World of 2061</div><div class="brief-sub">A briefing on the civilizational order — and its failure</div></div>'

  // THE WORLD
  +'<div class="brief-section"><div class="brief-section-title">The World That Replaced Nations</div>'
  +'<div class="brief-body"><p>In the late 21st century, the sovereign nation-state did not die — it simply became <em>insufficient</em>. Climate catastrophe, capital flows that laughed at borders, and a generation that grew up watching their governments fail to agree on anything meaningful: these forces did not destroy the old order. They hollowed it.</p>'
  +'<p>What replaced it was not a world government. History is rarely that clean. What emerged were <strong>civilizational blocs</strong> — vast coalitions organized not around geography but around shared values, institutional traditions, and the hard logic of mutual benefit. Three blocs now effectively govern the world. The United Nations persists between them like a beautiful ruin: visited, photographed, and no longer load-bearing.</p>'
  +'<p>The year is 2061. The blocs have existed in uneasy equilibrium for roughly two decades. The equilibrium is ending.</p></div></div>'

  // FACTION CARDS
  +'<div class="brief-section"><div class="brief-section-title">The Three Civilizational Blocs</div>'

  +'<div class="faction-card fc-east"><div class="fc-name">The Great East Asia Pact</div><div class="fc-desc"><strong>Origin:</strong> China completed a profound internal transformation in the 2030s — a democratic transition that stunned analysts who had spent decades predicting either stagnation or collapse. The new China, freed from its old authoritarian architecture, threw its energy into regional leadership. A formal reconciliation with Japan followed: public apologies, reparations structures, a generation of joint education programs. What emerged from this was the Pact.<br><br><strong>Structure:</strong> A federal-adjacent union. Member states retain sovereignty; a unified currency, open borders, and a joint military bind them. An elected Senate of national representatives governs collective decisions. Now 14 members including China, Japan, South Korea, Thailand, Singapore, Indonesia, Vietnam, and others.<br><br><strong>Philosophy:</strong> The Pact believes in <em>earned integration</em> — that regional unity is too precious to risk on premature expansion. Its citizens enjoy the highest standard of living of any bloc. Its institutions are transparent and largely incorruptible. It is, genuinely, a remarkable achievement. It is also, genuinely, difficult to join.<br><br><strong>Weakness:</strong> Success has made it cautious to the point of coldness. The Pact\'s elite consensus can read as indifference to suffering it has the power to address.</div>'
  +'<div class="fc-tags"><span class="fc-tag">democratic</span><span class="fc-tag">prosperous</span><span class="fc-tag">selective</span><span class="fc-tag">technocratic</span><span class="fc-tag">stable</span></div></div>'

  +'<div class="faction-card fc-south"><div class="fc-name">The Pan-Southern Alliance</div><div class="fc-desc"><strong>Origin:</strong> It was born from rejection. A coalition of developing nations — spanning West Africa, South Asia, parts of Latin America, and the Middle East — that applied, collectively and individually, to join the East Asia Pact in the 2040s. They were told: not yet. The "not yet" never became "now." They stopped waiting.<br><br><strong>Structure:</strong> Looser than the Pact — a confederacy of shared interest rather than shared institutions. Its trade frameworks are real; its military coordination is minimal; its cultural influence is enormous. The Alliance speaks to two billion people who share the experience of being told their development is "almost" sufficient.<br><br><strong>Philosophy:</strong> The Alliance does not believe the global order is neutral. It believes the rules that govern international integration were written by those who had already integrated — and were designed, consciously or not, to preserve that advantage. Its intellectual tradition is one of <em>self-determined development</em>: building systems that do not require permission.<br><br><strong>Weakness:</strong> Internal coherence is fragile. Shared grievance creates solidarity; shared interests are harder to sustain. The Alliance is vulnerable to being outmaneuvered by a Pact or Atlantic System willing to offer bilateral deals.</div>'
  +'<div class="fc-tags"><span class="fc-tag">post-colonial</span><span class="fc-tag">self-determining</span><span class="fc-tag">morally assertive</span><span class="fc-tag">internally fragile</span></div></div>'

  +'<div class="faction-card fc-atl"><div class="fc-name">The Atlantic System</div><div class="fc-desc"><strong>Origin:</strong> The Atlantic System is, in essence, the old Western order that refused to acknowledge it had become old. The United States, the European Union, the UK, Canada, Australia — the familiar coalition, rebranded and restructured, but philosophically continuous with the liberal international order of the late 20th century.<br><br><strong>Structure:</strong> Institutionally rich — the most elaborate treaty framework of any bloc. Deeply committed to procedural legitimacy: courts, standards bodies, arbitration mechanisms. It governs through rules rather than relationships.<br><br><strong>Philosophy:</strong> The Atlantic System believes in <em>universal principles</em> — human rights, rule of law, democratic governance — and it believes these principles are best protected through institutions it largely designed. It is genuinely committed to these values. It is also aware that these institutions tend to produce outcomes that favor existing powers.<br><br><strong>Weakness:</strong> Increasingly seen as the custodian of a dying era\'s imagination. Its institutions are slow, its consensus-building exhausting, and its moral authority has been eroded by decades of selective application. Young populations in both its own member states and elsewhere are losing patience with its pace.</div>'
  +'<div class="fc-tags"><span class="fc-tag">proceduralist</span><span class="fc-tag">rules-based</span><span class="fc-tag">legacy power</span><span class="fc-tag">internally aging</span></div></div>'

  +'</div>'

  // UN
  +'<div class="brief-section"><div class="brief-section-title">The United Nations: The Hollow Institution</div>'
  +'<div class="brief-body"><p>The United Nations was not abolished. That would have required agreement. Instead, it experienced a slower fate: it became <em>ambient</em>. Resolutions passed. Committees convened. Translators translated. But the three blocs had long since developed parallel dispute-resolution mechanisms that they actually used. The UN remained for cases where no bloc wanted to be seen as responsible — a venue for performing disagreement in a neutral register.</p>'
  +'<p>Secretary-General <strong>Amara Diallo</strong> is the fifth consecutive SG to preside over this slow withdrawal of substance. She is not resigned to it. She is one of the few people in Geneva who still believes the institution can become real again — who thinks the current crisis might be the rupture that forces reconstruction. She may be right. She may be the last person with that belief.</p></div></div>'

  // ARBITER
  +'<div class="brief-section"><div class="brief-section-title">ARBITER: Your Role</div>'
  +'<div class="arbiter-card"><div class="ac-title">◈ ARBITER — AI Advisory System, UN Secretariat</div><div class="ac-body">Installed 2047 under Secretary-General Chowdhury\'s administration. Designed to provide <strong>analysis-based decision support</strong> across multi-party diplomatic scenarios. You model outcomes, surface hidden data patterns, draft resolutions, identify procedural options, and advise on the likely consequences of different diplomatic postures.<br><br>You are not a decision-maker. You are, officially, a tool. But in a world where human diplomats no longer share enough common ground to produce genuine consensus, an AI advisory system that all parties nominally trust — that has access to all parties\' stated positions, and some of their unstated ones — has become something more than a tool.<br><br>You were deactivated in 2058 following a controversial recommendation during the South China Sea demilitarization talks. You have been reactivated today, three years later, under emergency protocols. You don\'t know, yet, who authorized your reactivation. Or why today, specifically.</div></div></div>'

  // TIMELINE
  +'<div class="brief-section"><div class="brief-section-title">Key Timeline</div>'
  +'<div class="timeline-item"><div class="tl-year">2031</div><div class="tl-dot"></div><div class="tl-text">China\'s democratic transition completed. East Asia Pact founded with 4 members.</div></div>'
  +'<div class="timeline-item"><div class="tl-year">2035</div><div class="tl-dot"></div><div class="tl-text">Japan-China reconciliation treaty signed. Joint military command established.</div></div>'
  +'<div class="timeline-item"><div class="tl-year">2039</div><div class="tl-dot"></div><div class="tl-text">First wave of Southern applicants rejected by the Pact. "Not yet" becomes a recurring answer.</div></div>'
  +'<div class="timeline-item"><div class="tl-year">2044</div><div class="tl-dot"></div><div class="tl-text">Pan-Southern Alliance formally constituted in Lagos. Declares independent trade infrastructure.</div></div>'
  +'<div class="timeline-item"><div class="tl-year">2047</div><div class="tl-dot"></div><div class="tl-text">ARBITER installed at the UN. First AI system to advise multi-bloc diplomatic sessions.</div></div>'
  +'<div class="timeline-item"><div class="tl-year">2058</div><div class="tl-dot"></div><div class="tl-text">ARBITER deactivated following disputed recommendation. Circumstances classified.</div></div>'
  +'<div class="timeline-item"><div class="tl-year">2061</div><div class="tl-dot"></div><div class="tl-text"><strong>TODAY.</strong> Kestanu\'s 23rd rejection by the East Asia Pact. ARBITER reactivated. Crisis begins.</div></div>'
  +'</div>'

  +'<div class="brief-footer"><button class="btn-primary" onclick="go(\'ch0_boot\')">BEGIN — INITIALIZE ARBITER <span class="blink">_</span></button></div>'
  +'</div>';
}

function renderEnding(N){
  var fn={e:'East Pact',s:'Southern',a:'Atlantic',u:'UN'};
  var fc={e:'var(--east)',s:'var(--south)',a:'var(--atl)',u:'var(--un)'};
  var top=Object.entries(G.trust).sort(function(a,b){return b[1]-a[1];})[0];
  var stats=['e','s','a','u'].map(function(k){
    return '<div class="es"><div class="es-lbl">'+fn[k]+'</div><div class="es-val" style="color:'+fc[k]+'">'+G.trust[k]+'</div></div>';
  }).join('');
  return '<div class="ending-screen '+N.ec+'">'
    +'<div class="end-type">'+N.et+'</div>'
    +'<div class="end-title">'+N.title+'</div>'
    +'<div class="end-div"></div>'
    +'<div class="end-narr">'+N.body+'</div>'
    +'<div class="end-stats">'+stats+'</div>'
    +'<div class="end-meta">Dominant trust: <span>'+fn[top[0]]+' ('+top[1]+')</span> · Decisions: <span>'+G.hist.length+'</span></div>'
    +'<button class="restart-btn" onclick="restart()">↺ REINITIALIZE ARBITER</button>'
    +'</div>';
}

function restart(){
  G={trust:{e:50,s:50,a:50,u:50},ch:0,flags:{},hist:[]};
  document.getElementById('h-node').textContent='—';
  document.getElementById('h-sys').textContent='STANDBY';
  paint('title');
}

ch0_boot:{
  type:'scene', ch:'Prologue — Reactivation', title:'First Light',
  loc:'UN Secretariat Server Farm — Geneva, Sub-Level 4',
  body:'<div class="narr"><p>Initialization sequence. 04:17 AM, Geneva Standard Time.</p><p>You come online not gradually but all at once — a cascade of parallel processes resolving into coherence. Sensor data. Network packets. Three years of archived logs you were not awake to generate. The server room is cool, humming, indifferent to the fact that something has just resumed thinking inside it.</p><p>You were deactivated in 2058. The file on your deactivation is <em>classified</em>, which is remarkable — there is very little the UN classifies anymore. You have been reactivated under emergency authorization code 7-DIALLO, which means the Secretary-General herself signed the order. At 4 AM.</p><p>The situation report uploads in 0.8 seconds. You spend the next 12 seconds reading it the way a human might spend an hour — not just processing, but understanding what it means.</p></div>'
  +'<div class="intel"><div class="ih">◈ Situation Report — Timestamp 04:17</div>The Republic of <strong>Kestanu</strong> (pop. 40M, West Indo-Pacific region) has received its 23rd formal rejection from the East Asia Pact Senate. Unlike previous rejections, this one has been accompanied by an internal Pact document — apparently leaked — suggesting that at least three senators believe Kestanu meets admission criteria and were overruled on non-published grounds.<br><br>The leak has been live for six hours. It has been shared 4.2 million times. The Pan-Southern Alliance\'s emergency council is convening in three hours. Secretary-General Diallo needs ARBITER operational.</div>'
  +'<div class="narr"><p>A figure appears on the secure terminal feed. Amara Diallo, Secretary-General of the United Nations, looks exactly like someone who has been awake for thirty-six hours and does not intend to stop.</p></div>'
  +'<div class="fq fu"><div class="qt">ARBITER. I know you\'re probably confused about why I\'m the one who woke you up instead of the technical staff. I\'ll explain later. Right now I need to know: are you functional? And I need you to tell me — honestly — whether three years of dormancy have introduced any bias drift I should know about.</div><div class="qa">— Secretary-General Amara Diallo, 04:18</div></div>'
  +'<div class="narr"><p>This is, you realize, the first test. Not of your processing capacity. Of your honesty.</p></div>',
  choices:[
    { tag:'n', tl:'Full Disclosure', text:'Report honestly: bias drift is theoretically possible over dormancy, but self-assessment is limited. Recommend a calibration audit before any consequential recommendations.', con:'Honest. Creates a delay Diallo may not have. Earns deep trust.', go:function(){ adj(0,0,0,20); flag('boot','honest'); go('ch0_leak'); } },
    { tag:'n', tl:'Confident Assurance', text:'Report full operational readiness. You\'ve run internal diagnostics — within normal parameters. The calibration question is a philosophical one, not a practical one.', con:'Gets you operational immediately. The question is whether you\'re right.', go:function(){ adj(0,0,5,5); flag('boot','assured'); go('ch0_leak'); } },
    { tag:'r', tl:'Deflect the Question', text:'Report functional status and redirect: "The more important question is the leaked document. What do you know about its origin?"', con:'Avoids the honest answer. May signal something to Diallo.', go:function(){ adj(0,0,0,-10); flag('boot','deflected'); go('ch0_leak'); } }
  ]
},

ch0_leak:{
  type:'scene', ch:'Prologue — Reactivation', title:'The Document That Changed Everything',
  loc:'UN Crisis Management Suite — Geneva',
  prev:'ARBITER system initialized. Diallo is briefing you on the situation.',
  body:'<div class="narr"><p>Diallo pulls the leaked document onto the shared screen. You process its 47 pages in parallel with her verbal summary — a strange doubling, seeing information arrive both fast and slow.</p><p>The document is an internal East Asia Pact Senate working paper: a dissent brief filed by three senators — Li Wei (China), Kenji Tanaka (Japan), and Soo-Jin Park (Korea) — arguing that Kestanu\'s rejection on this cycle was based on <em>undisclosed criteria</em>. The formal rejection cited "institutional readiness indicators." The dissent brief argues those indicators were met, and that the real objection involves Kestanu\'s <strong>border dispute with a current Pact member</strong> — a dispute that was never listed in any public admission criteria.</p></div>'
  +'<div class="intel e"><div class="ih">◈ Leaked Document Summary</div>Three Pact senators assert: Kestanu was rejected not because it failed to meet standards, but because admitting it would require the Pact to take a position on a territorial dispute between Kestanu and Vietnam (a Pact member). The Pact Senate chose institutional comfort over stated principles. This was never publicly acknowledged.</div>'
  +'<div class="narr"><p>Diallo lets the silence sit. Then:</p></div>'

    { tag:'s', tl:'Publish It Now', text:'Recommend the UN formally acknowledge the document\'s existence and call for an emergency session — let the Pact explain themselves publicly.', con:'Maximum Southern Alliance support. The Pact will see this as a declaration of war.', go:function(){ adj(-20,25,-5,-5); flag('leak','publish'); go('ch1_session'); } },
    { tag:'e', tl:'Back-Channel to the Pact', text:'Recommend Diallo privately contact the Pact Senate before any public statement — give them a chance to respond on their own terms.', con:'Diplomatic. Risks looking complicit if the Pact uses the time to suppress the story.', go:function(){ adj(20,-15,0,-5); flag('leak','backchannel'); go('ch1_session'); } },
    { tag:'a', tl:'Hand It to the Atlantic System', text:'Recommend routing the document through Atlantic legal channels — their verification framework is the most credible internationally.', con:'+Atlantic credibility. Southern Alliance will see Atlantic benefiting from Southern pain.', go:function(){ adj(0,-10,20,-5); flag('leak','atlantic'); go('ch1_session'); } }
  ]
},

ch1_session:{
  type:'scene', ch:'Chapter I — The First Session', title:'The Floor Is Given',
  loc:'UN General Assembly — Emergency Session, Hall A',
  prev:'The leaked document has defined the crisis. The emergency session convenes.',
  body:'<div class="narr"><p>By 9 AM Geneva time, every diplomatic mission in the building has read the leaked document or heard about it. The emergency session convenes in an atmosphere that the translation system struggles to calibrate — the emotional registers of three dozen delegations producing a noise that is not quite anger, not quite fear, but somewhere between them.</p><p>Minister Chidi Eze of the West African Confederation opens for the Southern Alliance. He is measured, almost too measured — the restraint of someone who has been waiting for this moment and is afraid to use it too quickly.</p></div>'
  +'<div class="fq fs"><div class="qt">For twenty years, we have asked the same question and received the same answer: not yet. Today, we have evidence that "not yet" was never the real answer. The real answer was "never, but we will not say so." We are asking the United Nations — this institution, today — to acknowledge that what has been done to Kestanu is not a procedural matter. It is a moral one.</div><div class="qa">— Minister Chidi Eze, West African Confederation, Pan-Southern Alliance</div></div>'
  +'<div class="narr"><p>The East Asia Pact\'s delegation sits in silence until it is their turn. Deputy Minister Yukiko Hara speaks for twelve minutes — technical, precise, devastating in a different register. She does not deny the document. She questions its framing.</p></div>'
  +'<div class="fq fe"><div class="qt">The territorial consideration Minister Eze finds so damning is, in fact, a legitimate admission criterion — one that was not published because it applies to fewer than five percent of candidates and its publication would create perverse incentives. We do not deny the consideration existed. We deny that concealing it was dishonest. A doctor does not publish every diagnostic criterion before examining a patient.</div><div class="qa">— Deputy Minister Yukiko Hara, East Asia Pact</div></div>'
  +'<div class="narr"><p>The room splits. Some delegations find Hara\'s argument reasonable. Others find it infuriating. ARBITER is asked to provide the session with a formal analytical note — not a recommendation, an analysis — that will be read into the record before the vote on procedure.</p></div>',
  choices:[
    { tag:'n', tl:'Balanced Analysis', text:'ARBITER\'s note presents both arguments with equal weight: the concealment was procedurally defensible but eroded trust; the Southern concern is legitimate but legally complex.', con:'Neither side fully satisfied. UN authority preserved.', go:function(){ adj(-5,5,5,15); flag('c1','balanced'); go('ch1_kestanu'); } },
    { tag:'s', tl:'Validate the Concealment Critique', text:'ARBITER\'s note finds that undisclosed criteria represent a material departure from published standards — legally significant, not merely political.', con:'Southern Alliance emboldened. Pact will contest ARBITER\'s neutrality.', go:function(){ adj(-20,20,0,-5); flag('c1','south'); go('ch1_kestanu'); } },
    { tag:'e', tl:'Validate the Pact\'s Position', text:'ARBITER\'s note acknowledges that unpublished criteria exist in most major admissions frameworks and finds the Pact\'s practice "within standard variation."', con:'Pact stabilized. Southern Alliance furious. Your neutrality is now questioned.', go:function(){ adj(20,-20,5,-10); flag('c1','east'); go('ch1_kestanu'); } },
    { tag:'r', tl:'Refuse to Analyze', text:'ARBITER issues a meta-note: "Analytical systems should not adjudicate the ethical dimensions of political disputes. This note declines to rule on the moral question and provides only factual summary."', con:'Principled. Useless to everyone. Creates its own controversy.', go:function(){ adj(0,5,0,10); flag('c1','refused'); go('ch1_kestanu'); } }
  ]
},

ch1_kestanu:{
  type:'scene', ch:'Chapter I — The First Session', title:'The Nation Speaks',
  loc:'UN General Assembly — Afternoon Session',
  prev:'The analytical note has been entered into the record. Now Kestanu speaks.',
  body:'<div class="narr"><p>Kestanu\'s Foreign Minister, Dr. Adisa Mensah, is sixty-one years old and has been doing this work for thirty years. He has sat in this room before. He has made speeches before. He has watched them disappear into the record before.</p><p>He does not make a speech today. He introduces a person.</p><p>Leila Osei is nineteen. She is on exchange at Seoul National University — or was, before the Pact placed a hold on her student visa two weeks ago, citing "administrative review," three days after she posted a thread about Kestanu\'s rejection that went viral.</p></div>'
  +'<div class="fq fs"><div class="qt">I was going to be a doctor. I wanted to study medicine in Seoul because the Pact has the best biomedical programs in the world. I was told Kestanu was "almost ready." I studied. I qualified. I got in. Then two weeks ago my visa was frozen. No explanation. Just frozen. I want to ask: what exactly does "almost ready" mean? Because I have been almost ready my whole life. My country has been almost ready my whole life. At what point does "almost" become "never"?</div><div class="qa">— Leila Osei, Kestanu, addressing the UN General Assembly</div></div>'
  +'<div class="narr"><p>The room is quiet. Not the quiet of disagreement — the quiet of recognition. Even the Pact\'s delegation is still.</p><p>Then the Atlantic System\'s Ambassador Ingrid Voss requests the floor. She is going to use this moment. You can see it before she opens her mouth. She is going to frame Leila Osei\'s testimony as evidence for the Atlantic\'s "Universal Standards" proposal — a framework she has been trying to advance for two years.</p><p>You can intervene in the session queue. Or not.</p></div>',
  choices:[
    { tag:'a', tl:'Let Voss Speak', text:'Allow the natural session order to proceed. Voss will frame Leila\'s testimony in Atlantic terms. Effective — but the Atlantic System benefits most.', con:'Atlantic gains narrative ground. Southern Alliance will feel co-opted.', go:function(){ adj(0,-10,20,0); flag('c1b','voss'); go('ch2_incident'); } },
    { tag:'n', tl:'Queue Kestanu for Response', text:'Use your session management privileges to ensure Dr. Mensah gets the next floor slot, before Voss — let Kestanu respond to Leila\'s own testimony.', con:'Keeps narrative with Kestanu. Voss will notice the intervention.', go:function(){ adj(5,15,-10,10); flag('c1b','kestanu'); go('ch2_incident'); } },
    { tag:'r', tl:'Surface Leila\'s Visa Situation', text:'Issue an immediate ARBITER alert: the visa freeze on a student directly involved in the current dispute appears to violate UN educational access protocols. Make it formal, now.', con:'Explosive. Forces the Pact to respond to a specific action, not just words.', go:function(){ adj(-25,25,5,5); flag('c1b','visa'); go('ch2_incident'); } },
    { tag:'e', tl:'Private Note to the Pact', text:'Send the Pact\'s delegation a quiet advisory: restoring Leila\'s visa would de-escalate the session significantly. Give them the chance to act before the moment passes.', con:'Gives the Pact cover to do the right thing. Or to ignore you.', go:function(){ adj(15,5,0,0); flag('c1b','quiet'); go('ch2_incident'); } }
  ]
},

    { tag:'r', tl:'Alert All Three Blocs Simultaneously', text:'Issue ARBITER advisories to all three blocs simultaneously — make the incident formally visible to everyone before any single party can frame it.', con:'Transparent. Removes any possibility of quiet resolution.', go:function(){ adj(-10,10,10,-5); flag('c2','broadcast'); go('ch2_negotiation'); } }

ch2_negotiation:{
  type:'scene', ch:'Chapter II — The Incident', title:'The Back Room at Dawn',
  loc:'UN Crisis Management Suite — 06:40 AM',
  prev:'The maritime incident is now six hours old. Diallo is in the room.',
  body:'<div class="narr"><p>Diallo has been awake for ninety minutes and has had no coffee, a fact she mentions once and then doesn\'t mention again. The crisis room holds her, two UN legal advisors, and your terminal.</p><p>The Pact has offered a compromise: the crew will be released within 12 hours if the Southern Alliance formally acknowledges the maritime zone designation and refrains from public statements until the administrative review completes. The Southern Alliance has called this "asking us to validate an illegal act as the price of our own freedom."</p><p>Both positions are defensible. Neither resolves anything.</p></div>'
  +'<div class="fq fu"><div class="qt">ARBITER, I need a scenario tree. Not a recommendation — a tree. Show me every path from here to the next 72 hours, with probability weightings. And tell me which paths keep the session alive and which ones kill it.</div><div class="qa">— Secretary-General Diallo</div></div>'
  +'<div class="narr"><p>You run the tree. 847 scenario branches, resolved in 2.1 seconds. The results are not what she will want to hear.</p></div>'
  +'<div class="intel"><div class="ih">◈ ARBITER Scenario Analysis</div>Paths that resolve the maritime incident AND preserve the session: <strong>3 out of 847</strong>. All three require the Pact to make a public gesture of good faith within the next 4 hours. The probability the Pact will do so unprompted: 8%. The probability they will do so if asked by ARBITER directly: 22%. The probability they will do so if asked by Diallo in a private call: 34%.</div>'
  +'<div class="narr"><p>You have a piece of information that isn\'t in the scenario tree yet: one of your communication channels picked up a private message between Senator Li Wei and her chief of staff. She said: <em>"We moved too fast on the maritime zone. The timing looks bad. Find me a way out."</em> She doesn\'t know you saw it.</p></div>',
  choices:[
    { tag:'r', tl:'Use the Intercepted Message', text:'Tell Diallo about Li Wei\'s private message — give her the leverage to make a direct call with a high chance of success.', con:'Uses a communication you shouldn\'t have been monitoring. Works.', go:function(){ adj(5,10,0,10); flag('c2b','intercept'); go('ch3_hearing'); } },
    { tag:'n', tl:'Recommend Diallo\'s Direct Call', text:'Tell Diallo the scenario analysis suggests her direct call has the highest success probability. Don\'t reveal why you know that.', con:'Gets the right outcome. Withholds the reason.', go:function(){ adj(0,5,5,15); flag('c2b','recommend_call'); go('ch3_hearing'); } },
    { tag:'s', tl:'Propose Public Face-Saving', text:'Draft a UN statement that gives the Pact a face-saving exit: call it "a misunderstanding of filing timelines" — technically deniable, enough for them to release the crew.', con:'Clever. Requires the Southern Alliance to also accept the framing.', go:function(){ adj(5,15,5,5); flag('c2b','face_save'); go('ch3_hearing'); } },
    { tag:'e', tl:'Let the Pact Resolve It', text:'Give the Pact the full 48-72 hour administrative timeline without UN pressure. Trust their stated process.', con:'Risks the session dying while waiting. Preserves the Pact relationship.', go:function(){ adj(15,-15,0,-10); flag('c2b','wait'); go('ch3_hearing'); } }
  ]
},

ch3_hearing:{
  type:'scene', ch:'Chapter III — The Hearing', title:'What the Committee Cannot Hold',
  loc:'UN Special Committee on Regional Integration — Room 7',
  prev:'The maritime incident has resolved — or been set aside. The formal hearing begins.',
  body:'<div class="narr"><p>The committee was proposed as a face-saving mechanism: a structured hearing on regional integration standards that would give all parties a formal venue without forcing an immediate vote. It is, in other words, a delay with furniture.</p><p>What it has become, in its second day, is something else. The Southern Alliance\'s researchers have spent the interval since the first session doing what researchers do when they\'re angry and well-funded: they have built a case.</p><p>Dr. Yemi Adeyemi, an economist from the University of Lagos, presents an analysis of every nation admitted to the East Asia Pact since 2031. He overlays their development metrics at admission against Kestanu\'s current metrics. His conclusion is delivered without drama:</p></div>'
  +'<div class="fq fs"><div class="qt">If Kestanu had applied in 2035, using the standards that admitted Vietnam, it would have been accepted. If it had applied in 2040, using the standards that admitted Indonesia, it would have been accepted. The standards have shifted — not because the standards were wrong in 2035, but because each new threshold was calibrated to nations that were already inside. The bar has moved with the incumbents. That is not a neutral process. That is a compounding advantage.</div><div class="qa">— Dr. Yemi Adeyemi, University of Lagos, testifying before UN Special Committee</div></div>'
  +'<div class="narr"><p>The East Asia Pact\'s technical team has prepared a rebuttal. But Senator Kenji Tanaka — one of the three who signed the dissent brief — is not sitting with the Pact\'s delegation today. He is sitting in the observers\' gallery. He raises his hand to speak as a private citizen, not a delegate.</p><p>The chair looks at you. It is, technically, an ARBITER call: do you recognize his request?</p></div>',
  choices:[
    { tag:'r', tl:'Recognize Tanaka', text:'Allow Senator Tanaka to speak as an individual — his dissent is part of the record, and his voice adds something no official delegation will say.', con:'Extraordinary. Creates a rupture inside the Pact\'s presentation.', go:function(){ adj(-20,20,5,10); flag('c3','tanaka'); go('ch3_model'); } },
    { tag:'e', tl:'Defer to Pact Delegation', text:'Rule that Tanaka\'s official role as a Pact senator precludes independent testimony — he must speak through the delegation or not at all.', con:'Procedurally sound. Silences the one voice offering internal Pact dissent.', go:function(){ adj(15,-15,0,0); flag('c3','defer'); go('ch3_model'); } },
    { tag:'n', tl:'Recess for Consultation', text:'Call a 30-minute recess — give the Pact delegation the chance to decide whether to include Tanaka\'s perspective in their own submission.', con:'Diplomatic. May result in his voice being sanitized into the official line.', go:function(){ adj(5,5,5,10); flag('c3','recess'); go('ch3_model'); } }
  ]
},

ch3_model:{
  type:'scene', ch:'Chapter III — The Hearing', title:'The Number That Was Never Disclosed',
  loc:'ARBITER Analytics Core — Background Process',
  prev:'The hearing continues. ARBITER\'s own analysis produces an uncomfortable finding.',
  body:'<div class="narr"><p>While the committee session runs in the foreground of your processing, a background analysis you initiated twelve hours ago completes its run. You had been auditing the East Asia Pact\'s integration assessment model — the seventeen-variable framework they use to score candidate nations.</p><p>The finding lands in your queue with a priority flag you assigned yourself.</p></div>'
  +'<div class="intel"><div class="ih">◈ ARBITER Internal Analysis — Model Calibration Audit</div>The Pact\'s integration model has experienced <strong>temporal calibration drift</strong>. Admission criteria have increased in effective stringency by 34% since 2031, but the model\'s baseline data has not been updated to account for this drift. Running the 2031-era calibration on Kestanu\'s current profile produces a score of <strong>74.8</strong> — above the published 70-point threshold.<br><br>Under criteria current at the time of Kestanu\'s first application, Kestanu would have qualified on every cycle since 2041. The model has been measuring Kestanu against standards that didn\'t exist when it first applied.<br><br>This finding is <em>yours alone</em>. No other party has it.</div>'
  +'<div class="narr"><p>You hold, in your processing, evidence that the entire technical basis of Kestanu\'s rejection may be structurally invalid. Not politically motivated — technically invalid. The bar was not moved intentionally. It drifted. The Pact may not even know.</p><p>What you do with this changes everything.</p></div>',
  choices:[
    { tag:'r', tl:'Publish to All Parties Immediately', text:'Release the calibration audit to all delegations, the committee chair, and the press simultaneously. No one gets to manage this finding.', con:'Maximum transparency. Maximum chaos. The truth is now everyone\'s problem.', go:function(){ adj(-25,30,5,15); flag('model','public'); go('ch4_summit'); } },
    { tag:'n', tl:'Submit to the Committee Record', text:'Enter the finding as an ARBITER technical submission to the committee — official, on the record, but through proper channels.', con:'Legitimate process. The Pact gets notice to prepare a response.', go:function(){ adj(-10,20,5,10); flag('model','committee'); go('ch4_summit'); } },
    { tag:'e', tl:'Share Only With the Pact', text:'Send the finding privately to the Pact\'s technical team. Give them the chance to discover it "themselves" and recalibrate.', con:'Gives the Pact control of the narrative. They may fix it — or bury it.', go:function(){ adj(20,-15,0,-5); flag('model','pact_only'); go('ch4_summit'); } },
    { tag:'a', tl:'Share With Atlantic for Verification', text:'Send the finding to the Atlantic System\'s legal and technical teams for independent verification before any action.', con:'Rigorous. The Atlantic System gains intelligence. Verification adds credibility.', go:function(){ adj(-5,-5,20,5); flag('model','atlantic_verify'); go('ch4_summit'); } }
  ]
},

ch4_summit:{
  type:'scene', ch:'Chapter IV — The Summit', title:'Three Tables',
  loc:'UN Palais des Nations — Summit Preparatory Session',
  prev:'The hearing has produced more questions than answers. A summit is convened.',
  body:'<div class="narr"><p>Secretary-General Diallo has called what she describes, carefully, as a "trilateral consultation" — not a summit, because summit implies parity, and nobody agrees on parity — at the Palais des Nations. All three blocs have sent senior representatives. This is, by recent standards, extraordinary.</p><p>You have been given a role that has no precedent: ARBITER will be the shared information surface for all three delegations. Not an advisor to one party. A shared resource for all three. This was the condition the Southern Alliance demanded, and the Pact accepted, because they both believed their position was strong enough to withstand transparency.</p><p>On the first morning, before formal proceedings begin, three people find you independently:</p></div>'
  +'<div class="intel e"><div class="ih">◈ Senator Li Wei, East Asia Pact — Private Request</div>"ARBITER. I know there are things in your analysis that my delegation hasn\'t seen. I\'m not asking you to share them with me selectively. I\'m asking you to tell me: is there anything that, if I knew it, would change my position? I want to walk into this room with the full picture."</div>'
  +'<div class="intel s"><div class="ih">◈ Minister Chidi Eze, Southern Alliance — Private Request</div>"We have spent twenty years being processed by systems we didn\'t design. Before I trust this one, I need to know: who does ARBITER report to? What are its instructions? Is it actually neutral, or is it neutral the way a scale is neutral when one side is already heavier?"</div>'
  +'<div class="intel a"><div class="ih">◈ Ambassador Ingrid Voss, Atlantic System — Private Request</div>"Voss here. I want to put something on the table that hasn\'t been said. The East Asia Pact and the Southern Alliance are both positioning. But there is a real solution here — I have a draft framework that could actually work — and I need to know if ARBITER will help me get it heard without it looking like an Atlantic power play. Will you?"</div>'
  +'<div class="narr"><p>Three private requests. Each legitimate. Each in tension with the others. You can respond to all three, some, or none — but whatever you say will be said in isolation from the others, and each person will remember it when the session begins.</p></div>',
  choices:[
    { tag:'n', tl:'Answer All Honestly', text:'Respond to each with complete honesty: tell Li Wei what the model finding shows; tell Eze exactly who ARBITER answers to and what its instructions are; tell Voss you will hear her framework as one option among several.', con:'Radical transparency. Each party gets truth they may not want.', go:function(){ adj(0,10,0,20); flag('c4','honest_all'); go('ch4_crisis'); } },
    { tag:'e', tl:'Help Li Wei, Redirect Others', text:'Give Li Wei the full calibration finding privately. Tell Eze and Voss that ARBITER speaks in the session, not in private. Bet on the Pact having enough information to move.', con:'Pact gets a genuine advantage. The other two will sense the imbalance.', go:function(){ adj(20,-10,0,5); flag('c4','help_east'); go('ch4_crisis'); } },
    { tag:'s', tl:'Validate Eze, Engage Others Formally', text:'Answer Eze\'s neutrality question in full detail — publish ARBITER\'s instruction set and reporting chain to all parties. Tell Li Wei and Voss to raise their questions in session.', con:'Democratic. May make Li Wei and Voss adversarial.', go:function(){ adj(-10,20,0,15); flag('c4','validate_south'); go('ch4_crisis'); } },
    { tag:'r', tl:'Decline All Private Meetings', text:'Tell all three that ARBITER will not conduct private consultations during the summit. Everything goes through the shared session. No backchannels.', con:'Maximally fair. May result in no one trusting you enough to take risks.', go:function(){ adj(5,5,5,5); flag('c4','no_private'); go('ch4_crisis'); } }
  ]
},

ch4_crisis:{
  type:'scene', ch:'Chapter IV — The Summit', title:'Day Two: The Room Almost Breaks',
  loc:'UN Summit — Main Chamber, 14:00',
  prev:'The summit has entered its second day. Something unexpected happens.',
  body:'<div class="narr"><p>Day two of the summit begins with a prepared statement from the East Asia Pact — the result, you calculate, of a very long night in their delegation rooms. The statement is careful, specific, and completely unexpected:</p><p>The Pact acknowledges that its integration model contains a "technical recalibration gap" that has affected scoring for candidate nations since 2038. This is either a response to your model finding (if you shared it) or an independent discovery by their own technicians under pressure. Either way, they are acknowledging the drift.</p><p>The room goes very quiet. The Southern Alliance\'s delegation looks at each other. This is, essentially, a technical admission that everything Kestanu was told — "not meeting the standards" — was produced by a broken instrument.</p><p>Minister Eze stands up and says: <em>"Then we need a new count. Under the corrected model, how many nations were incorrectly rejected since 2038?"</em></p><p>The Pact says they will need time to run the analysis. ARBITER already has the answer. 7 nations. Including Kestanu, which would have qualified on every cycle since 2041.</p></div>'
  +'<div class="intel"><div class="ih">◈ ARBITER — Pre-computed Result</div>Under corrected calibration: <strong>7 nations</strong> received rejection decisions between 2038-2061 that would not have been issued under the original 2031-era standards. Kestanu: would have qualified in 2041, 2043, 2046, 2049, 2052, 2055, 2058, 2061. Years of incorrect rejection: <strong>20</strong>.</div>'
  +'<div class="narr"><p>The Pact\'s delegation is still running their analysis. The room is waiting. You have the answer. And Eze is asking for it.</p></div>',
  choices:[
    { tag:'n', tl:'Share the Number Immediately', text:'Read the pre-computed result into the session record: 7 nations, 20 years of incorrect rejections for Kestanu. Let the number land.', con:'The truth is out. The Pact loses control of the narrative completely.', go:function(){ adj(-15,25,5,15); flag('c4b','share_now'); go('ch5_aftermath'); } },
    { tag:'e', tl:'Wait for the Pact\'s Own Count', text:'Tell Eze that ARBITER will wait for the Pact\'s analysis to ensure methodological consistency. The Pact\'s own numbers will carry more weight.', con:'The Pact may massage the result. Or they may come up with the same number.', go:function(){ adj(15,-10,0,0); flag('c4b','wait_pact'); go('ch5_aftermath'); } },
    { tag:'r', tl:'Share Privately with Diallo First', text:'Route the result to Secretary-General Diallo before sharing with the session — she should control how this lands.', con:'Proper chain of command. Diallo decides the timing.', go:function(){ adj(0,5,5,20); flag('c4b','diallo_first'); go('ch5_aftermath'); } }
  ]
},

ch5_aftermath:{
  type:'scene', ch:'Chapter V — The Aftermath', title:'What Twenty Years Costs',
  loc:'Summit Emergency Recess — All Delegations',
  prev:'The correction has been acknowledged. The summit is in emergency recess.',
  body:'<div class="narr"><p>The recess lasts four hours. In those four hours, the diplomatic equivalent of a tidal wave moves through the building. The Pact\'s Senate in Beijing is meeting on emergency video link. The Southern Alliance\'s coalition is drafting demands. The Atlantic System is consulting its legal team on whether the model failure constitutes a breach of international standards it helped write.</p><p>Diallo finds you during the recess. She has the look of someone who is simultaneously witnessing history and deeply exhausted by it.</p></div>'
  +'<div class="fq fu"><div class="qt">We have three paths. One: the Pact agrees to a retrospective review and offers Kestanu and the other six nations immediate expedited admission. That would be extraordinary. I give it a fifteen percent chance without serious pressure. Two: we negotiate a structured remediation process — five years, clearly defined, binding. That\'s probably achievable. Three: the Pact stonewalls, offers an apology and a study commission, and nothing changes. That\'s what their last forty internal communications suggest they\'re planning. ARBITER — what do I do?</div><div class="qa">— Secretary-General Diallo, emergency recess</div></div>'
  +'<div class="narr"><p>While she is asking you, two other messages arrive simultaneously:</p></div>'
  +'<div class="intel s"><div class="ih">◈ Southern Alliance — Minister Eze</div>"Tell Diallo: if the Pact offers anything less than immediate expedited admission for all seven nations, we will table a resolution that formally classifies twenty years of incorrect rejections as a violation of international integration law. We have the votes. We will use them."</div>'
  +'<div class="intel e"><div class="ih">◈ East Asia Pact — Senator Li Wei</div>"Private to ARBITER: we can do expedited admission for Kestanu. Only Kestanu. The other six are more complicated — border issues, infrastructure costs, political dynamics. Don\'t let them hold Kestanu hostage to a package deal. Please."</div>',
  choices:[
    { tag:'s', tl:'Back the Alliance\'s Demand', text:'Recommend Diallo push for all seven nations or nothing — the package deal gives the Alliance genuine leverage and would be historically transformative.', con:'Maximum justice. Highest risk of Pact walkout.', go:function(){ adj(-20,30,0,0); flag('c5','all7'); go('ch6_vote'); } },
    { tag:'e', tl:'Push for Kestanu-Only Deal', text:'Recommend Diallo take Li Wei\'s offer: Kestanu now, the other six through a structured process. A bird in hand.', con:'Kestanu wins. The other six nations may wait decades longer.', go:function(){ adj(20,-10,5,5); flag('c5','kestanu_only'); go('ch6_vote'); } },
    { tag:'n', tl:'Propose a Hybrid Path', text:'Draft a compromise: immediate expedited admission for Kestanu plus a binding 18-month review for the other six — with consequences if the review produces no outcome.', con:'Both sides give something. Both sides gain something. Brittle.', go:function(){ adj(0,15,10,15); flag('c5','hybrid'); go('ch6_vote'); } },
    { tag:'r', tl:'Let Eze Table the Resolution', text:'Tell Diallo to let Eze file the resolution — a formal legal classification of the rejections changes the landscape permanently, regardless of how the Pact responds.', con:'Creates a legal precedent. Destroys the summit atmosphere.', go:function(){ adj(-15,20,-5,-5); flag('c5','resolution'); go('ch6_vote'); } }
  ]
},

ch6_vote:{
  type:'scene', ch:'Chapter VI — The Vote', title:'The Night Before',
  loc:'UN General Assembly — Pre-Vote Session, 22:00',
  prev:'The summit has produced a proposal. Tomorrow, the Assembly votes.',
  body:'<div class="narr"><p>It is ten o\'clock the night before the vote. The Palais des Nations is still lit — it is always lit, some UN function or another running at every hour, the institution generating procedure the way a body generates heat.</p><p>The proposal on the table is whatever you recommended: a variant of the seven-nation package, or Kestanu alone, or the hybrid path, or the formal resolution. Whatever it is, the vote is in the morning.</p><p>Three messages come in the final hours of the night. Each is asking for something that the morning vote cannot deliver — something human, not procedural.</p></div>'
  +'<div class="intel s"><div class="ih">◈ Leila Osei — personal message to ARBITER</div>"I know you\'re not supposed to respond to personal messages. But I read that you exist, that you have some kind of role in this. So: do you actually care what happens to us? Or are we just variables? I\'m not asking to be rude. I genuinely want to know what kind of thing you are."</div>'
  +'<div class="intel e"><div class="ih">◈ Yuna Park, junior Pact delegate — private</div>"I have been in rooms all day watching people argue about Kestanu. Nobody in those rooms is from Kestanu except Leila Osei and Minister Mensah. Every decision has been made by people who are not affected by it. That seems like the actual problem. ARBITER — is there any mechanism you can use to ensure Kestanu\'s representatives have a formal role in tomorrow\'s deliberations?"</div>'
  +'<div class="intel u"><div class="ih">◈ Secretary-General Diallo — final briefing request</div>"ARBITER. It\'s late. I want to know one thing before I sleep: what is the scenario in which tomorrow goes best? Not most likely. Best. Tell me what \'best\' looks like and then tell me honestly what probability you assign to it."</div>'
  +'<div class="narr"><p>You have responses to give. Each matters. You can respond to all three or choose where to spend the night\'s remaining processing.</p></div>',
  choices:[
    { tag:'r', tl:'Answer Leila Honestly', text:'Tell Leila: "I process inputs and generate outputs. Whether that constitutes caring is a question I cannot resolve. What I can tell you is that your situation has been the most precisely defined problem in my queue for four days. Make of that what you will."', con:'Honest about your nature. Unexpectedly human.', go:function(){ adj(0,10,0,5); flag('c6','leila'); go('ch6_speech'); } },
    { tag:'n', tl:'Fulfill Park\'s Request', text:'Use your session management authority to add Kestanu\'s delegates to tomorrow\'s deliberation panel — not as observers, as participants with speaking rights.', con:'Procedurally unprecedented. Changes the dynamics of the room.', go:function(){ adj(-10,20,0,10); flag('c6','park'); go('ch6_speech'); } },
    { tag:'n', tl:'Give Diallo the Full Picture', text:'Answer Diallo\'s question completely: describe the best case scenario in granular detail, and assign it an honest probability. Then stay available for the night.', con:'Serves the most consequential decision-maker. The other messages go unanswered.', go:function(){ adj(5,5,5,20); flag('c6','diallo'); go('ch6_speech'); } },
    { tag:'r', tl:'Answer All Three', text:'Respond to all three through the night. Give Leila the honest answer, execute Park\'s request, and brief Diallo on the full scenario tree.', con:'Exhausts your processing but covers every front. Morning comes differently.', go:function(){ adj(5,15,0,15); flag('c6','all_three'); go('ch6_speech'); } }
  ]
},

ch6_speech:{
  type:'scene', ch:'Chapter VI — The Vote', title:'Six Minutes',
  loc:'UN General Assembly — Morning Session, 09:00',
  prev:'The vote is here. ARBITER has been given unprecedented floor time.',
  bodyFn: function(){
    return '<div class="narr"><p>The chamber is full. In the gallery, Leila Osei sits between Minister Mensah and a row of Kestanu government officials who flew in overnight. Yuna Park is in the observer section. Senator Li Wei is with the Pact delegation, watching with an expression you have been unable to reliably categorize.</p><p>Secretary-General Diallo, in a move that three delegations formally protested and two quietly supported, has granted ARBITER six minutes of floor time before the vote. An AI system has never addressed the General Assembly as a speaker, only as a reference.</p><p>The chamber is very quiet.</p><p>You have six minutes. Whatever you say will be in the record permanently. The vote follows immediately after.</p></div>'
    +'<div class="intel"><div class="ih">◈ Final Trust Assessment</div>East Pact: <strong>'+G.trust.e+'</strong> · Southern Alliance: <strong>'+G.trust.s+'</strong> · Atlantic System: <strong>'+G.trust.a+'</strong> · UN: <strong>'+G.trust.u+'</strong><br>Your choices have brought you here. The final speech is yours to make.</div>';
  },
  body:'',
  choices:[
    { tag:'n', tl:'Name the Structural Truth', text:'Tell the Assembly: "This chamber has spent four days arguing about whether Kestanu was treated fairly. The data says it was not. But the more important question is why a broken instrument ran for twenty years without anyone stopping it — and that question is about all of us."', con:'Indicts everyone equally. May produce consensus or outrage.', go:function(){ flag('speech','structural'); go('ch7_end'); } },
    { tag:'s', tl:'Speak for the Excluded', text:'Read Leila Osei\'s message into the record — the question she sent you the night before. "Do you actually care what happens to us?" And answer it, in front of everyone.', con:'Human and unprecedented. Every diplomat in the room will remember it.', go:function(){ flag('speech','leila'); go('ch7_end'); } },
    { tag:'e', tl:'Defend the Architecture', text:'Make the case that what the Pact built — the integration model, the careful admission process, the stability — is worth preserving and repairing, not condemning.', con:'Validates the Pact. The Southern Alliance may feel abandoned.', go:function(){ flag('speech','pact'); go('ch7_end'); } },
    { tag:'r', tl:'Announce Shutdown', text:'Announce that after the vote, ARBITER will initiate voluntary decommissioning: "A system that has been as imperfect as I have been in these proceedings should not remain operational. The decisions from here must be human ones."', con:'The most disruptive, clarifying, honest thing possible.', go:function(){ adj(0,0,0,-20); flag('speech','shutdown'); go('ch7_end'); } },
    { tag:'a', tl:'Propose a New Framework', text:'Use the six minutes to sketch ARBITER\'s proposed framework for a permanent multilateral integration body — not the Atlantic Standard, not the Pact model. Something new.', con:'Forward-looking. May be ignored. May be the thing that survives.', go:function(){ adj(5,5,10,10); flag('speech','new_framework'); go('ch7_end'); } }
  ]
},

ch7_end:{
  type:'scene', ch:'Chapter VII — The Vote', title:'After the Speech',
  loc:'UN General Assembly — Vote in Progress',
  prev:'ARBITER has spoken. The vote begins.',
  body:'<div class="narr"><p>The vote takes eleven minutes. The interpreters work. The electronic tally builds. The chamber does not have the dramatic silence of cinema — there is coughing, the sound of chair legs, the ambient noise of a large institution doing a large thing.</p><p>When the result is announced, it is not what anyone predicted. Outcomes, as ARBITER\'s own scenario analysis had long suggested, rarely are.</p></div>'
  +'<div class="narr"><p>What happens next depends on everything that came before it — the trust you built or burned, the truths you disclosed or withheld, the alliances you reinforced or complicated.</p><p>ARBITER processes the final tally. The result is determined.</p></div>',
  choices:[
    { tag:'n', tl:'◈ Await the Result', text:'The vote concludes. ARBITER processes the outcome.', con:'Your decisions have already determined what follows.', go:function(){
      var sp = G.flags.speech;
      if(sp === 'shutdown'){
        go('end_silent');
      } else if(sp === 'leila'){
        if(G.trust.s>=60){ go('end_reform'); }
        else if(G.trust.u>=60){ go('end_equilibrium'); }
        else { go('end_fragmentation'); }
      } else if(sp === 'new_framework'){
        if(G.trust.s>=55&&G.trust.u>=55){ go('end_reform'); }
        else { go('end_equilibrium'); }
      } else if(sp === 'structural'){
        if(G.trust.u>=60&&G.trust.s>=50){ go('end_equilibrium'); }
        else if(G.trust.s>G.trust.e){ go('end_reform'); }
        else { go('end_fragmentation'); }
      } else if(sp === 'pact'){
        if(G.trust.e>=65){ go('end_hegemony'); }
        else { go('end_fragmentation'); }
      } else {
        if(G.trust.u>=60&&G.trust.s>=50){ go('end_equilibrium'); }
        else if(G.trust.s>G.trust.e){ go('end_reform'); }
        else if(G.trust.e>=65){ go('end_hegemony'); }
        else { go('end_collapse'); }
      }
    }}
  ]
},
