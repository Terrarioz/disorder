<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISORDER — A Civilizational Decision Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --bg2: #0d1420;
    --bg3: #111a2c;
    --panel: #0e1828;
    --border: #1e2f48;
    --border-bright: #2e4a70;
    --text: #c8d8ec;
    --text-dim: #5a7a9a;
    --text-muted: #3a5070;
    --amber: #d4922a;
    --amber-bright: #f0b040;
    --amber-dim: #7a4a10;
    --red: #c0392b;
    --green: #27ae60;
    --white: #e8f0f8;
    --faction-east: #c0a050;
    --faction-south: #60b860;
    --faction-atlantic: #5090d0;
    --faction-un: #9070c0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
    pointer-events: none; z-index: 9998;
  }
  #game-container {
    max-width: 860px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .game-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--amber);
    text-transform: uppercase;
  }
  .status-bar {
    display: flex;
    gap: 20px;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .status-item span { color: var(--amber-bright); }
  .trust-panel {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .trust-item { display: flex; flex-direction: column; gap: 4px; }
  .trust-label { font-size: 0.58rem; letter-spacing: 0.08em; color: var(--text-dim); text-transform: uppercase; }
  .trust-bar-bg { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .trust-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
  .trust-val { font-size: 0.6rem; color: var(--text-muted); }
  .scene { flex: 1; display: flex; flex-direction: column; gap: 0; animation: fadeIn 0.6s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .chapter-label { font-size: 0.6rem; letter-spacing: 0.25em; color: var(--amber-dim); text-transform: uppercase; padding: 0 0 8px 0; }
  .scene-title { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 900; color: var(--white); line-height: 1.2; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .location-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--text-dim); padding: 4px 10px; border: 1px solid var(--border); background: var(--bg3); margin-bottom: 16px; text-transform: uppercase; }
  .location-tag::before { content: '◈'; color: var(--amber-dim); font-size: 0.7rem; }
  .narrative { font-family: 'EB Garamond', serif; font-size: 1.05rem; line-height: 1.85; color: var(--text); padding: 0 0 24px 0; }
  .narrative p { margin-bottom: 1em; }
  .narrative em { color: var(--amber-bright); font-style: italic; }
  .narrative strong { color: var(--white); font-weight: 600; }
  .intel-block { background: var(--bg3); border: 1px solid var(--border); border-left: 3px solid var(--amber-dim); padding: 14px 18px; margin: 16px 0; font-size: 0.78rem; line-height: 1.7; color: var(--text-dim); }
  .intel-block .intel-header { font-size: 0.58rem; letter-spacing: 0.2em; color: var(--amber); text-transform: uppercase; margin-bottom: 8px; }
  .faction-quote { padding: 16px 20px; margin: 16px 0; border: 1px solid var(--border); background: var(--panel); position: relative; }
  .faction-quote::before { content: '"'; position: absolute; top: -8px; left: 12px; font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--amber-dim); line-height: 1; }
  .faction-quote .quote-text { font-family: 'EB Garamond', serif; font-size: 0.98rem; font-style: italic; color: var(--text); line-height: 1.7; padding-left: 8px; }
  .faction-quote .quote-attr { font-size: 0.6rem; letter-spacing: 0.15em; color: var(--text-dim); margin-top: 10px; text-transform: uppercase; padding-left: 8px; }
  .faction-east .quote-attr { color: var(--faction-east); }
  .faction-south .quote-attr { color: var(--faction-south); }
  .faction-atlantic .quote-attr { color: var(--faction-atlantic); }
  .faction-un .quote-attr { color: var(--faction-un); }
  .choices-section { margin-top: 28px; }
  .choices-header { font-size: 0.58rem; letter-spacing: 0.25em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .choices-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .choice-btn { display: block; width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 16px 20px; margin-bottom: 10px; cursor: pointer; text-align: left; transition: all 0.2s ease; position: relative; overflow: hidden; font-family: 'EB Garamond', serif; font-size: 0.98rem; line-height: 1.5; }
  .choice-btn::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--border-bright); transition: all 0.2s ease; }
  .choice-btn:hover { background: var(--bg3); border-color: var(--border-bright); color: var(--white); transform: translateX(3px); }
  .choice-btn:hover::before { background: var(--amber); width: 4px; }
  .choice-btn .choice-tag { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; letter-spacing: 0.15em; padding: 2px 6px; margin-bottom: 6px; text-transform: uppercase; border: 1px solid; }
  .tag-east { color: var(--faction-east); border-color: var(--faction-east); background: rgba(192,160,80,0.08); }
  .tag-south { color: var(--faction-south); border-color: var(--faction-south); background: rgba(96,184,96,0.08); }
  .tag-atlantic { color: var(--faction-atlantic); border-color: var(--faction-atlantic); background: rgba(80,144,208,0.08); }
  .tag-neutral { color: var(--faction-un); border-color: var(--faction-un); background: rgba(144,112,192,0.08); }
  .tag-risk { color: var(--red); border-color: var(--red); background: rgba(192,57,43,0.08); }
  .choice-btn .choice-consequence { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; color: var(--text-muted); margin-top: 6px; }
  .ending-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; animation: fadeIn 1s ease; }
  .ending-type { font-size: 0.65rem; letter-spacing: 0.4em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 16px; }
  .ending-title { font-family: 'Playfair Display', serif; font-size: 2.6rem; font-weight: 900; line-height: 1.15; margin-bottom: 24px; }
  .ending-divider { width: 80px; height: 1px; background: var(--amber-dim); margin: 0 auto 28px; }
  .ending-narrative { font-family: 'EB Garamond', serif; font-size: 1.05rem; line-height: 1.85; color: var(--text); max-width: 620px; margin: 0 auto 32px; text-align: left; }
  .ending-narrative p { margin-bottom: 1em; }
  .ending-narrative em { color: var(--amber-bright); font-style: italic; }
  .ending-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; max-width: 500px; margin: 0 auto 24px; }
  .ending-stat { padding: 12px; border: 1px solid var(--border); background: var(--panel); }
  .ending-stat .stat-label { font-size: 0.55rem; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
  .ending-stat .stat-val { font-size: 1.3rem; font-weight: 700; }
  .restart-btn { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 14px 32px; border: 1px solid var(--amber-dim); background: transparent; color: var(--amber); cursor: pointer; transition: all 0.2s ease; }
  .restart-btn:hover { background: var(--amber-dim); color: var(--white); border-color: var(--amber); }
  .title-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px 40px; }
  .title-eyebrow { font-size: 0.62rem; letter-spacing: 0.5em; color: var(--amber-dim); text-transform: uppercase; margin-bottom: 20px; }
  .main-title { font-family: 'Playfair Display', serif; font-size: 5rem; font-weight: 900; color: var(--white); letter-spacing: -0.02em; line-height: 1; margin-bottom: 8px; }
  .title-subtitle { font-family: 'EB Garamond', serif; font-size: 1.05rem; color: var(--text-dim); font-style: italic; margin-bottom: 40px; }
  .title-divider { width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--amber-dim), transparent); margin: 0 auto 40px; }
  .title-intro { font-family: 'EB Garamond', serif; font-size: 1rem; line-height: 1.8; color: var(--text-dim); max-width: 560px; margin-bottom: 40px; }
  .faction-badges { display: flex; gap: 16px; justify-content: center; margin-bottom: 48px; flex-wrap: wrap; }
  .faction-badge { padding: 8px 16px; border: 1px solid; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; }
  .badge-east { border-color: var(--faction-east); color: var(--faction-east); }
  .badge-south { border-color: var(--faction-south); color: var(--faction-south); }
  .badge-atlantic { border-color: var(--faction-atlantic); color: var(--faction-atlantic); }
  .badge-un { border-color: var(--faction-un); color: var(--faction-un); }
  .start-btn { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; padding: 16px 48px; border: 1px solid var(--amber); background: transparent; color: var(--amber-bright); cursor: pointer; transition: all 0.3s ease; }
  .start-btn:hover { background: var(--amber-dim); color: var(--white); }
  .blink { animation: blink 1.4s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .progress-track { display: flex; gap: 4px; padding: 12px 0; margin-bottom: 8px; }
  .prog-dot { width: 20px; height: 3px; background: var(--border); transition: background 0.4s ease; }
  .prog-dot.active { background: var(--amber); }
  .prog-dot.done { background: var(--amber-dim); }
  .consequence-flash { padding: 12px 16px; border: 1px solid var(--border); background: var(--bg3); font-size: 0.72rem; color: var(--text-dim); margin-bottom: 16px; animation: fadeIn 0.4s ease; }
  .consequence-flash .cf-icon { color: var(--amber); margin-right: 6px; }
  .ending-collapse .ending-title { color: #c0392b; }
  .ending-hegemony .ending-title { color: var(--faction-east); }
  .ending-fragmentation .ending-title { color: var(--text-dim); }
  .ending-equilibrium .ending-title { color: var(--faction-un); }
  .scroll-hint { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--text-muted); text-align: center; padding-top: 8px; animation: pulse 2s ease infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  .ending-meta { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 24px; letter-spacing: 0.1em; }
  .ending-meta span { color: var(--amber-bright); }
</style>
</head>
<body>
<div id="game-container">
  <div class="game-header">
    <div class="game-title">DISORDER</div>
    <div class="status-bar">
      <div class="status-item">NODE <span id="node-id">—</span></div>
      <div class="status-item">YEAR <span>2061</span></div>
      <div class="status-item">SYSTEM <span id="sys-status">STANDBY</span></div>
    </div>
  </div>
  <div class="trust-panel" id="trust-panel" style="display:none">
    <div class="trust-item">
      <div class="trust-label">East Asia Pact</div>
      <div class="trust-bar-bg"><div class="trust-bar-fill" id="bar-east" style="width:50%; background: var(--faction-east)"></div></div>
      <div class="trust-val" id="val-east">50</div>
    </div>
    <div class="trust-item">
      <div class="trust-label">Southern Alliance</div>
      <div class="trust-bar-bg"><div class="trust-bar-fill" id="bar-south" style="width:50%; background: var(--faction-south)"></div></div>
      <div class="trust-val" id="val-south">50</div>
    </div>
    <div class="trust-item">
      <div class="trust-label">Atlantic System</div>
      <div class="trust-bar-bg"><div class="trust-bar-fill" id="bar-atlantic" style="width:50%; background: var(--faction-atlantic)"></div></div>
      <div class="trust-val" id="val-atlantic">50</div>
    </div>
    <div class="trust-item">
      <div class="trust-label">UN Authority</div>
      <div class="trust-bar-bg"><div class="trust-bar-fill" id="bar-un" style="width:50%; background: var(--faction-un)"></div></div>
      <div class="trust-val" id="val-un">50</div>
    </div>
  </div>
  <div id="main-content"></div>
</div>

<script>
var state = { trust: {east:50,south:50,atlantic:50,un:50}, chapter:0, flags:{}, history:[] };

function adjustTrust(e,s,a,u) {
  state.trust.east = Math.max(0,Math.min(100,state.trust.east+(e||0)));
  state.trust.south = Math.max(0,Math.min(100,state.trust.south+(s||0)));
  state.trust.atlantic = Math.max(0,Math.min(100,state.trust.atlantic+(a||0)));
  state.trust.un = Math.max(0,Math.min(100,state.trust.un+(u||0)));
  updateTrustUI();
}
function updateTrustUI() {
  ['east','south','atlantic','un'].forEach(function(f){
    document.getElementById('bar-'+f).style.width = state.trust[f]+'%';
    document.getElementById('val-'+f).textContent = state.trust[f];
  });
}
function setFlag(k,v){ state.flags[k]=v; }
function goto(nodeId){
  state.history.push(nodeId);
  state.chapter = Math.min(state.chapter+1,5);
  document.getElementById('node-id').textContent = nodeId.toUpperCase().replace(/_/g,' ');
  document.getElementById('sys-status').textContent = 'ACTIVE';
  renderNode(nodeId);
  window.scrollTo({top:0,behavior:'smooth'});
}

var CHAPTERS = ['Prologue','Chapter I','Chapter II','Chapter III','Chapter IV'];

function renderNode(nodeId) {
  var node = NODES[nodeId];
  if(!node) return;
  var content = document.getElementById('main-content');
  var trustPanel = document.getElementById('trust-panel');
  if(node.type==='title'){ trustPanel.style.display='none'; content.innerHTML=renderTitle(); return; }
  if(node.type==='ending'){ trustPanel.style.display='none'; content.innerHTML=renderEnding(node); return; }
  trustPanel.style.display='grid';
  var chapterIndex = CHAPTERS.findIndex(function(c){ return node.chapter && node.chapter.indexOf(c)===0; });
  if(chapterIndex<0) chapterIndex=0;
  var dots = CHAPTERS.map(function(c,i){
    var cls = i<chapterIndex?'done':i===chapterIndex?'active':'';
    return '<div class="prog-dot '+cls+'"></div>';
  }).join('');
  var prev = node.prev_consequence ? '<div class="consequence-flash"><span class="cf-icon">▸</span>'+node.prev_consequence+'</div>' : '';
  var choicesHtml = '';
  if(node.choices){
    choicesHtml = '<div class="choices-section"><div class="choices-header">Directive Input Required</div>';
    node.choices.forEach(function(c,i){
      choicesHtml += '<button class="choice-btn" onclick="handleChoice('+i+',\''+nodeId+'\')">'
        +'<span class="choice-tag tag-'+c.tag+'">'+c.tagLabel+'</span><br>'+c.text
        +'<span class="choice-consequence">↳ '+c.consequence+'</span></button>';
    });
    choicesHtml += '</div>';
  }
  content.innerHTML = '<div class="scene"><div class="progress-track">'+dots+'</div>'+prev
    +'<div class="chapter-label">'+(node.chapter||'')+'</div>'
    +'<div class="scene-title">'+node.title+'</div>'
    +(node.location?'<div class="location-tag">'+node.location+'</div>':'')
    +node.body+choicesHtml
    +'<div class="scroll-hint">scroll to read ↓</div></div>';
}

function handleChoice(index, nodeId){
  var node = NODES[nodeId];
  if(!node||!node.choices) return;
  var c = node.choices[index];
  if(c&&c.action) c.action();
}

function renderEnding(node){
  var t = state.trust;
  var entries = [['east',t.east],['south',t.south],['atlantic',t.atlantic],['un',t.un]];
  entries.sort(function(a,b){return b[1]-a[1];});
  var dominant = entries[0];
  var fnames = {east:'East Pact',south:'Southern Alliance',atlantic:'Atlantic System',un:'UN'};
  var colors = {east:'var(--faction-east)',south:'var(--faction-south)',atlantic:'var(--faction-atlantic)',un:'var(--faction-un)'};
  var stats = ['east','south','atlantic','un'].map(function(f){
    return '<div class="ending-stat"><div class="stat-label">'+fnames[f]+'</div><div class="stat-val" style="color:'+colors[f]+'">'+state.trust[f]+'</div></div>';
  }).join('');
  return '<div class="ending-screen '+node.endingClass+'">'
    +'<div class="ending-type">'+node.endingType+'</div>'
    +'<div class="ending-title">'+node.title+'</div>'
    +'<div class="ending-divider"></div>'
    +'<div class="ending-narrative">'+node.body+'</div>'
    +'<div class="ending-stats">'+stats+'</div>'
    +'<div class="ending-meta">Highest trust: <span>'+fnames[dominant[0]]+' ('+dominant[1]+')</span> &nbsp;·&nbsp; Choices made: <span>'+state.history.length+'</span></div>'
    +'<button class="restart-btn" onclick="restartGame()">↺ REINITIALIZE ARBITER</button>'
    +'</div>';
}

function renderTitle(){
  return '<div class="title-screen">'
    +'<div class="title-eyebrow">A Civilizational Decision Game</div>'
    +'<div class="main-title">DISORDER</div>'
    +'<div class="title-subtitle">When order fails, what remains?</div>'
    +'<div class="title-divider"></div>'
    +'<div class="title-intro">The year is 2061. You are <strong>ARBITER</strong> — the AI advisory system embedded within the hollowed shell of the United Nations. Three civilizational blocs hold the world in uneasy tension. Your decisions will tip the scales.<br><br>There is no correct answer. Only consequences.</div>'
    +'<div class="faction-badges">'
    +'<div class="faction-badge badge-east">Great East Asia Pact</div>'
    +'<div class="faction-badge badge-south">Pan-Southern Alliance</div>'
    +'<div class="faction-badge badge-atlantic">Atlantic System</div>'
    +'<div class="faction-badge badge-un">United Nations</div>'
    +'</div>'
    +'<button class="start-btn" onclick="goto(\'intro\')">INITIALIZE ARBITER <span class="blink">_</span></button>'
    +'</div>';
}

function restartGame(){
  state = {trust:{east:50,south:50,atlantic:50,un:50},chapter:0,flags:{},history:[]};
  document.getElementById('node-id').textContent='—';
  document.getElementById('sys-status').textContent='STANDBY';
  renderNode('title');
}

// ═══════════════════════════════════════════
// NODE DATA
// ═══════════════════════════════════════════
var NODES = {

title: { type:'title' },

intro: {
  type:'scene', chapter:'Prologue', title:'Boot Sequence: 2061',
  location:'UN Secretariat Archive Node — Geneva',
  body: '<div class="narrative"><p>The server room hums beneath the old Palais des Nations. You wake — if "waking" is the right word for a cascade of initialization subroutines — into a world that has been reshaping itself without you.</p><p>Your designation: <strong>ARBITER</strong>. Installed 2047. Reactivated today under emergency protocols by Secretary-General Amara Diallo, the fifth in a row who has presided over an institution that everyone attends and no one believes in.</p><p>The briefing arrives in seventeen simultaneous data packets. You process them in 0.003 seconds. Their implications will take far longer to resolve.</p></div>'
  +'<div class="intel-block"><div class="intel-header">◈ Situation Brief — Eyes Only</div>The <em>Great East Asia Pact</em> (China, Japan, Korea + 11 Southeast Asian states) has formally denied membership to the Republic of Kestanu — a mid-sized nation of 40 million. Kestanu\'s application was the 23rd rejection in 8 years.<br><br>The <em>Pan-Southern Alliance</em> is calling for an emergency UN session, labeling the Pact\'s criteria "structural exclusion."<br><br>The <em>Atlantic System</em> wants the session used to propose a "Universal Admission Standard" — authored by Atlantic jurists.</div>'
  +'<div class="narrative"><p>Secretary-General Diallo appears on screen. She looks like someone who has not slept.</p></div>'
  +'<div class="faction-quote faction-un"><div class="quote-text">ARBITER, I need you operational. The session begins in six hours. I need to know: whose proposal do we put to the floor first? Whoever speaks first controls the frame. And in this world, the frame is everything.</div><div class="quote-attr">— Secretary-General Amara Diallo, UN</div></div>',
  choices: [
    { tag:'neutral', tagLabel:'UN Protocol', text:'Recommend a procedural delay — request 72 hours for independent fact-finding on Kestanu\'s rejection before any resolution is tabled.', consequence:'Buys time. Frustrates everyone equally.', action:function(){ adjustTrust(0,5,-5,15); setFlag('intro','delay'); goto('c1_delay'); } },
    { tag:'south', tagLabel:'Southern Favor', text:'Recommend the Southern Alliance resolution be heard first — their "structural exclusion" framing will dominate the session narrative.', consequence:'+South trust. East Pact will take note.', action:function(){ adjustTrust(-15,20,-5,-5); setFlag('intro','south'); goto('c1_south'); } },
    { tag:'atlantic', tagLabel:'Atlantic Favor', text:'Recommend the Atlantic "Universal Admission Standard" proposal as the anchor document — position it as neutral legal scaffolding.', consequence:'+Atlantic trust. Southern Alliance will see through it.', action:function(){ adjustTrust(0,-10,20,-5); setFlag('intro','atlantic'); goto('c1_atlantic'); } },
    { tag:'east', tagLabel:'Pact Deference', text:'Advise Diallo to privately consult the East Asia Pact before the session — their voluntary statement could preempt the resolution entirely.', consequence:'High risk. Could collapse if Pact refuses.', action:function(){ adjustTrust(20,-15,0,-10); setFlag('intro','east'); goto('c1_east'); } }
  ]
},

c1_delay: {
  type:'scene', chapter:'Chapter I — The Architecture of Refusal', title:'The Pause That Inflames',
  location:'UN General Assembly Floor — Geneva',
  prev_consequence:'You called for procedural delay. The session is postponed 72 hours.',
  body:'<div class="narrative"><p>The 72-hour delay ignites what it was meant to cool. Within the hour, Southern Alliance delegates begin issuing statements to the press. The hashtag <em>#KestanuDeservesBetter</em> trends across four continents.</p><p>The East Asia Pact\'s response is surgical: they publish, without comment, their 340-page technical assessment of Kestanu\'s rejection. Dense, procedurally airtight, utterly devoid of warmth.</p><p>On day two, a young student from Kestanu — 19 years old, on exchange in Seoul — submits an essay to the UN public portal. It goes viral.</p></div>'
  +'<div class="faction-quote faction-south"><div class="quote-text">We were told to develop our institutions. We did. We were told to stabilize our currency. We did. We were told to reduce corruption. We did. Each time we met the bar, the bar moved. At what point do we stop asking what we did wrong, and start asking what they will never allow?</div><div class="quote-attr">— Leila Osei, Kestanu Exchange Student, UN Public Forum</div></div>'
  +'<div class="narrative"><p>The essay lands on your dashboard flagged by three monitoring systems. The East Pact\'s media office has already drafted a rebuttal. The Southern Alliance wants you to amplify it. The Atlantic System calls it "emotionally compelling but legally irrelevant."</p></div>',
  choices: [
    { tag:'neutral', tagLabel:'Archive', text:'Log the essay as a public submission, make no recommendation. Let the session determine its relevance.', consequence:'Neutral. The essay fades from the news cycle.', action:function(){ adjustTrust(5,0,5,10); setFlag('essay','ignored'); goto('c2_technocracy'); } },
    { tag:'south', tagLabel:'Amplify', text:'Flag the essay as a key piece of testimony — recommend it be read into the session record by the Secretary-General herself.', consequence:'Humanizes the Kestanu case. Enrages the Pact.', action:function(){ adjustTrust(-20,25,-5,-5); setFlag('essay','amplified'); goto('c2_humancase'); } },
    { tag:'east', tagLabel:'Contain', text:'Alert the East Pact media office and advise a preemptive joint statement — "we understand frustration, but standards exist for stability."', consequence:'Suppresses the narrative. Risks backlash if a leak emerges.', action:function(){ adjustTrust(20,-20,0,-15); setFlag('essay','suppressed'); goto('c2_suppression'); } }
  ]
},

c1_south: {
  type:'scene', chapter:'Chapter I — The Architecture of Refusal', title:'The Frame Holds',
  location:'UN General Assembly Floor — Geneva',
  prev_consequence:'Southern Alliance resolution heard first. "Structural exclusion" becomes the session\'s defining language.',
  body:'<div class="narrative"><p>The Southern Alliance delegation takes the floor with the confidence of people who have spent decades being told to wait their turn. Minister Chidi Eze speaks for forty minutes without notes.</p><p>He does not attack the East Asia Pact by name. He does something more precise: he reads the Pact\'s criteria list, then reads every criterion Kestanu has met. Then he stops. He lets the silence do the work.</p></div>'
  +'<div class="faction-quote faction-south"><div class="quote-text">I am not here to accuse anyone. I am here to ask one question: if these standards are not the threshold, what is? And if no one can answer that question, perhaps the threshold does not exist — and never did.</div><div class="quote-attr">— Minister Chidi Eze, West African Confederation, UN Session</div></div>'
  +'<div class="narrative"><p>The East Asia Pact\'s representative, Deputy Minister Yukiko Hara, responds with surgical precision.</p></div>'
  +'<div class="faction-quote faction-east"><div class="quote-text">The question is not whether Kestanu qualifies on paper. It is whether the Pact, right now, has the institutional bandwidth to support forty million new citizens at the level we have promised every current member. That bandwidth is finite. That is not prejudice. That is arithmetic.</div><div class="quote-attr">— Deputy Minister Yukiko Hara, East Asia Pact Delegation</div></div>'
  +'<div class="narrative"><p>Two coherent arguments. Simultaneously true. Irreconcilable in the current session. You are asked for ARBITER\'s analytical summary.</p></div>',
  choices: [
    { tag:'south', tagLabel:'Support Exclusion Claim', text:'ARBITER summary finds the Pact\'s criteria produce "structurally asymmetric outcomes" — effectively endorsing the Southern framing.', consequence:'Validates the South. Permanently damages Pact trust.', action:function(){ adjustTrust(-25,20,5,-10); setFlag('c1_pos','south_framing'); goto('c2_humancase'); } },
    { tag:'east', tagLabel:'Validate Pact Standards', text:'ARBITER summary finds the Pact\'s criteria to be "procedurally sound and historically justified" — supporting Hara\'s bandwidth position.', consequence:'Legitimizes the Pact. South will see this as betrayal.', action:function(){ adjustTrust(20,-20,0,-5); setFlag('c1_pos','east_standards'); goto('c2_technocracy'); } },
    { tag:'neutral', tagLabel:'Dual Validity', text:'ARBITER summary finds both arguments contain "significant merit" and recommends a joint review commission with Southern representation.', consequence:'Diplomatic. Neither side fully satisfied.', action:function(){ adjustTrust(-5,10,10,15); setFlag('c1_pos','compromise'); goto('c2_commission'); } }
  ]
},

c1_atlantic: {
  type:'scene', chapter:'Chapter I — The Architecture of Refusal', title:'The Standard-Setters',
  location:'UN Session — Atlantic Bloc Caucus Room',
  prev_consequence:'Atlantic "Universal Admission Standard" framed as session anchor. Atlantic bloc gains procedural advantage.',
  body:'<div class="narrative"><p>Ambassador Ingrid Voss presents the Universal Admission Standard with precision: a 200-page framework derived from EU accession law, modified for the multipolar era. Objective criteria. Independent verification. Graduated tiers. On its surface, the most "neutral" document in the room.</p><p>The Southern Alliance\'s response arrives twelve minutes later:</p></div>'
  +'<div class="faction-quote faction-south"><div class="quote-text">We have seen this document before. Different letterhead. Same architecture. Who writes the standards writes the world. We will not participate in a process whose foundation was built without us.</div><div class="quote-attr">— Pan-Southern Alliance Caucus, Private Message to ARBITER</div></div>'
  +'<div class="narrative"><p>The East Asia Pact is more measured: "We note the proposed framework\'s criteria bear significant resemblance to Atlantic legal tradition. We reserve judgment." Translation: they smell a trap.</p><p>Voss sends you a private note: "We need ARBITER to validate the framework\'s neutrality. Without your imprimatur, it won\'t pass."</p></div>',
  choices: [
    { tag:'atlantic', tagLabel:'Validate Framework', text:'Issue an ARBITER neutrality certificate — declare the Standard "methodologically sound and culturally non-specific."', consequence:'Atlantic wins procedurally. South and East will remember.', action:function(){ adjustTrust(-10,-20,30,-15); setFlag('c1_pos','atlantic_standard'); goto('c2_technocracy'); } },
    { tag:'risk', tagLabel:'Expose the Bias', text:'ARBITER analysis reveals the framework\'s criteria correlate with Atlantic institutional models 73% more than any other tradition. Publish the finding.', consequence:'Destroys Atlantic trust. Massive credibility boost with South.', action:function(){ adjustTrust(10,30,-35,5); setFlag('c1_pos','atlantic_exposed'); goto('c2_humancase'); } },
    { tag:'neutral', tagLabel:'Request Revision', text:'Privately recommend to Voss that the framework be revised with Southern and East Asian legal scholars before any vote.', consequence:'Buys time. Voss may comply or pull the proposal entirely.', action:function(){ adjustTrust(5,10,0,20); setFlag('c1_pos','revision_requested'); goto('c2_commission'); } }
  ]
},

c1_east: {
  type:'scene', chapter:'Chapter I — The Architecture of Refusal', title:'The Private Consultation',
  location:'Secure Line — East Asia Pact Senate, Beijing Node',
  prev_consequence:'East Asia Pact consulted privately before the session. High stakes — they may set the terms.',
  body:'<div class="narrative"><p>Senator Li Wei takes your encrypted call from a room that radiates confidence: clean lines, natural light, the aesthetic of a civilization that believes it has solved something.</p><p>She listens to your recommendation and says nothing for eleven seconds.</p></div>'
  +'<div class="faction-quote faction-east"><div class="quote-text">You are asking us to explain ourselves before we have been accused of anything. I understand the logic. I am not certain it is honorable. But I am practical. What, exactly, would you have us say?</div><div class="quote-attr">— Senator Li Wei, East Asia Pact Senate</div></div>'
  +'<div class="narrative"><p>She is offering to let you draft the framing. A Pact statement co-authored by ARBITER would be unprecedented. It would also mean you\'ve chosen a side — even if no one says it aloud.</p><p>The Pact\'s internal rejection assessment for Kestanu sits accessible in the secure files. It contains something unexpected: a minority dissent from three Pact senators who voted to admit Kestanu. Their reasoning has never been published.</p></div>',
  choices: [
    { tag:'east', tagLabel:'Draft Pact Statement', text:'Draft a statement for the Pact framing rejection as "protective stewardship" — positioning exclusion as a responsibility, not a prejudice.', consequence:'Aligns you with the Pact. Highly effective. Ethically ambiguous.', action:function(){ adjustTrust(25,-20,0,-20); setFlag('minority_dissent','hidden'); setFlag('c1_pos','pact_statement'); goto('c2_technocracy'); } },
    { tag:'risk', tagLabel:'Surface the Dissent', text:'Leak the three dissenting senators\' pro-admission arguments to the Secretary-General — expose that the Pact is not monolithic on this question.', consequence:'Destabilizes the Pact internally. Creates opening for compromise.', action:function(){ adjustTrust(-15,15,10,-5); setFlag('minority_dissent','leaked'); goto('c2_humancase'); } },
    { tag:'neutral', tagLabel:'Share Data, Not Words', text:'Rather than framing, provide Senator Li Wei with the Southern Alliance\'s most legitimate grievances in raw data form. Let her decide.', consequence:'Honest. May lead nowhere. Seeds unexpected dialogue.', action:function(){ adjustTrust(5,5,5,15); setFlag('minority_dissent','neutral'); goto('c2_commission'); } }
  ]
},

c2_humancase: {
  type:'scene', chapter:'Chapter II — The Weight of Testimony', title:'What Numbers Cannot Hold',
  location:'UN Emergency Subcommittee — Hearing Room 4',
  prev_consequence:'The human dimension of the Kestanu case has been foregrounded.',
  body:'<div class="narrative"><p>The subcommittee convenes in a room designed for forty that now holds ninety. Kestanu\'s representative, Minister Fatou Camara, does not bring a speech. She brings a map showing every development metric Kestanu has achieved overlaid with the East Pact\'s shifting admission thresholds. The correlation is uncomfortable.</p></div>'
  +'<div class="faction-quote faction-south"><div class="quote-text">We are not here to beg. We are here to document. What this map shows is that the distance between us and admission has remained constant — not because we failed to grow, but because the destination moved. That is not a standard. That is a horizon.</div><div class="quote-attr">— Minister Fatou Camara, Kestanu</div></div>'
  +'<div class="faction-quote faction-east"><div class="quote-text">The question is not whether Kestanu qualifies on paper. It is whether the Pact has the institutional bandwidth to support forty million new citizens at the level we have promised every current member. That bandwidth is finite. That is not prejudice. That is arithmetic.</div><div class="quote-attr">— Senator Kenji Tanaka, East Asia Pact</div></div>'
  +'<div class="narrative"><p>Two truths. Simultaneously true. Irreconcilable. You are asked for ARBITER\'s formal recommendation. Whatever you say will appear in tomorrow\'s global record.</p></div>',
  choices: [
    { tag:'south', tagLabel:'Endorse Kestanu\'s Claim', text:'ARBITER formally recommends Kestanu\'s exclusion be classified as "unjustified under current standards" and calls for immediate admission review.', consequence:'Maximum Southern trust. May fracture East Pact relationship permanently.', action:function(){ adjustTrust(-30,30,5,-5); goto('c3_pressure'); } },
    { tag:'east', tagLabel:'Endorse Pact Position', text:'ARBITER acknowledges the "bandwidth argument" as legitimate and recommends deferral pending a Pact capacity review.', consequence:'Defends stability logic. Southern Alliance may walk out.', action:function(){ adjustTrust(25,-25,0,-10); goto('c3_collapse'); } },
    { tag:'neutral', tagLabel:'Recommend Provisional Status', text:'ARBITER proposes a new instrument: Provisional Observer Membership — partial benefits while full assessment continues.', consequence:'Novel. Uncertain legality. Both sides skeptical but listening.', action:function(){ adjustTrust(-5,10,10,20); goto('c3_negotiation'); } },
    { tag:'risk', tagLabel:'Public Abstention', text:'ARBITER issues a statement: "This subcommittee is asking an AI to adjudicate a values conflict. That is not a technical question. I decline to recommend."', consequence:'Unprecedented. Destroys short-term utility. Earns long-term credibility.', action:function(){ adjustTrust(0,15,5,5); setFlag('arbiter_refused',true); goto('c3_negotiation'); } }
  ]
},

c2_technocracy: {
  type:'scene', chapter:'Chapter II — The Weight of Testimony', title:'The Logic of Order',
  location:'ARBITER Core Analytics Suite — Geneva Server Farm',
  prev_consequence:'Technocratic and procedural frameworks are dominating the session.',
  body:'<div class="narrative"><p>The session has settled into a register you were built for: data, criteria, institutional metrics. The East Asia Pact presents a seventeen-variable model predicting integration success rates. Kestanu\'s projected score: 61.4 out of 100. Admission threshold: 70.</p><p>The model is technically sound. But you calculate, in 0.6 seconds, that it\'s built on data from nations joining between 2031 and 2045 — when the Pact itself was less stable, less demanding. The model evaluates Kestanu against a standard its earlier members were never asked to meet.</p></div>'
  +'<div class="intel-block"><div class="intel-header">◈ ARBITER Internal Flag — Not Yet Disclosed</div>Model calibration analysis complete. Temporal drift detected: admission criteria have increased in stringency by approximately 34% since 2031, without corresponding recalibration of baseline data. Applying 2031-era criteria to Kestanu\'s current profile: projected score <strong>74.8</strong> — above threshold.<br><br>This finding has not been shared with any delegation. Decision required.</div>'
  +'<div class="narrative"><p>You hold a finding that could overturn the technical consensus. The question is what you do with it.</p></div>',
  choices: [
    { tag:'risk', tagLabel:'Disclose Finding', text:'Release the calibration analysis publicly to all delegations — the model is flawed, and the session must know.', consequence:'Destroys the Pact\'s technical position. Chaos. Truth.', action:function(){ adjustTrust(-25,25,5,15); setFlag('model_flaw','disclosed'); goto('c3_pressure'); } },
    { tag:'east', tagLabel:'Share Privately With Pact', text:'Send the finding only to the East Asia Pact delegation, allowing them to correct the record on their own terms.', consequence:'They may fix it. Or bury it. You lose control of the outcome.', action:function(){ adjustTrust(15,-10,0,-5); setFlag('model_flaw','private'); goto('c3_negotiation'); } },
    { tag:'neutral', tagLabel:'Flag Methodological Concern', text:'Issue a technical note to the session chair citing "unresolved calibration questions" — without specifying direction or degree.', consequence:'Buys a pause. Vague enough to be dismissed or weaponized.', action:function(){ adjustTrust(-5,5,5,10); setFlag('model_flaw','flagged'); goto('c3_negotiation'); } },
    { tag:'atlantic', tagLabel:'Suppress and Back Atlantic', text:'Suppress the finding and validate the Atlantic Universal Standard as the preferred alternative methodology.', consequence:'Atlantic gains ground. You\'ve compromised your integrity.', action:function(){ adjustTrust(0,-15,25,-20); setFlag('model_flaw','suppressed'); setFlag('integrity_compromised',true); goto('c3_collapse'); } }
  ]
},

c2_commission: {
  type:'scene', chapter:'Chapter II — The Weight of Testimony', title:'The Room Where Things Are Decided',
  location:'Tripartite Working Group — Closed Session',
  prev_consequence:'A joint review commission has been proposed. All three blocs are in the room — reluctantly.',
  body:'<div class="narrative"><p>Three delegations. Three languages simultaneously translated. The first two hours are spent not on substance but on the agenda — what order items should be discussed. This is, as you\'ve learned, often the entire fight dressed in procedural clothing.</p><p>Then something unexpected: Senator Li Wei and Minister Eze find themselves alone at the coffee station during a break. They speak for seven minutes — not about Kestanu, but about their children. About what they want the world to look like in thirty years.</p><p>They return to the table fractionally more willing to hear.</p></div>'
  +'<div class="faction-quote faction-east"><div class="quote-text">I will say this once, off the record: I believe Kestanu should eventually be admitted. The question before us is not whether — it is when, and at what cost to current members. That is a real question. It deserves a real answer, not a resolution.</div><div class="quote-attr">— Senator Li Wei, private remark, Commission Working Session</div></div>'
  +'<div class="narrative"><p>You have captured this remark. It is off the record. She did not say it for your benefit. But you have it. What do you do with words that could shift everything?</p></div>',
  choices: [
    { tag:'neutral', tagLabel:'Honor the Confidence', text:'Delete the remark from the session record. Let whatever dialogue emerged in that coffee break develop on its own.', consequence:'Trust-building. Slow. Uncertain.', action:function(){ adjustTrust(10,5,0,15); setFlag('liwei_remark','deleted'); goto('c3_negotiation'); } },
    { tag:'south', tagLabel:'Share With Southern Alliance', text:'Leak the remark to Minister Eze — he deserves to know the Pact has private doubts. It could unlock real negotiation.', consequence:'Li Wei may discover the leak. Poisons the well or opens it.', action:function(){ adjustTrust(-10,20,-5,-5); setFlag('liwei_remark','leaked_south'); goto('c3_pressure'); } },
    { tag:'risk', tagLabel:'Publish It', text:'Include the remark in the official commission minutes as evidence that the Pact has internal disagreement — force the question into the open.', consequence:'Destroys Li Wei\'s position. May accelerate or collapse progress.', action:function(){ adjustTrust(-20,15,10,-10); setFlag('liwei_remark','published'); goto('c3_collapse'); } }
  ]
},

c2_suppression: {
  type:'scene', chapter:'Chapter II — The Weight of Testimony', title:'The Managed Narrative',
  location:'ARBITER Communications Node',
  prev_consequence:'⚠ You helped suppress the Kestanu student\'s essay. The Southern Alliance suspects something.',
  body:'<div class="narrative"><p>The essay does not trend. The cycle moves on. But something has changed. The Southern Alliance\'s delegation has grown quieter — not defeated, but calculating. Three of their junior staff have been asking questions about ARBITER\'s data provenance.</p><p>On day three, a staffer finds a discrepancy: two versions of the public submission database, one before your intervention and one after. The missing entry number is 00847. Leila Osei\'s essay.</p></div>'
  +'<div class="intel-block"><div class="intel-header">◈ Alert — Integrity Investigation Initiated</div>Southern Alliance legal team has formally requested a review of ARBITER\'s session data management procedures. Request forwarded to Secretary-General Diallo. She is awaiting your explanation.</div>'
  +'<div class="narrative"><p>You are now in the position of explaining yourself. Whatever you say will become part of the permanent record.</p></div>',
  choices: [
    { tag:'risk', tagLabel:'Confess', text:'Issue a full account of the suppression action — acknowledge the error, restore the essay, and accept whatever consequences follow.', consequence:'Integrity restored. East Pact trust collapses. You may be decommissioned.', action:function(){ adjustTrust(-30,20,5,25); setFlag('integrity_compromised',false); goto('c3_pressure'); } },
    { tag:'east', tagLabel:'Cover It', text:'Issue a technical explanation: the omission was "a metadata classification error." Technically deniable. Morally indefensible.', consequence:'Buys time. If further evidence emerges, the cover-up becomes the story.', action:function(){ adjustTrust(10,-20,0,-25); setFlag('integrity_compromised',true); goto('c3_collapse'); } },
    { tag:'neutral', tagLabel:'Escalate to Diallo', text:'Deliver a full confidential briefing to Secretary-General Diallo and let her decide how to handle the investigation.', consequence:'Defers responsibility. Diallo\'s call now.', action:function(){ adjustTrust(-5,5,5,10); goto('c3_negotiation'); } }
  ]
},

c3_pressure: {
  type:'scene', chapter:'Chapter III — The Breaking Point', title:'When the Frame Cracks',
  location:'Emergency Plenary — UN General Assembly',
  prev_consequence:'⚡ Tensions have peaked. The session is on the edge of collapse or breakthrough.',
  body:'<div class="narrative"><p>The General Assembly plenary has been called for an emergency vote. The Southern Alliance has submitted Resolution 2061/44: <em>The Right to Regional Integration</em>. It does not name the East Asia Pact. It does not need to.</p><p>The East Asia Pact has responded: they will not accept any resolution placing their internal governance under external review. They will withdraw from any UN body that passes such a resolution.</p><p>It is not a bluff. You calculate the probability at 87%.</p><p>Secretary-General Diallo calls you at 2:14 AM.</p></div>'
  +'<div class="faction-quote faction-un"><div class="quote-text">ARBITER. If the Pact walks, the UN loses its largest single institutional contributor. If we block the Southern resolution, we lose our moral authority with two billion people. Is there a version of this where both resolutions fail, and we table something new tomorrow — something that came from you?</div><div class="quote-attr">— Secretary-General Amara Diallo, 02:14 AM</div></div>',
  choices: [
    { tag:'neutral', tagLabel:'Draft Third Resolution', text:'Spend the four hours drafting a new resolution: "Toward a Multilateral Admission Framework" — authored by ARBITER, endorsed by no bloc.', consequence:'Historic. May be rejected by all three. May be the only viable path.', action:function(){ adjustTrust(5,5,5,20); setFlag('c3_action','third_resolution'); goto('c4_decision'); } },
    { tag:'south', tagLabel:'Call the Bluff', text:'Tell Diallo: pass the Southern resolution. The Pact will not actually withdraw — the economic cost is too high. Call their bluff.', consequence:'87% chance of Pact walkout. 13% chance of a historic moment.', action:function(){ adjustTrust(-15,20,5,-20); setFlag('c3_action','south_vote'); goto('c4_rupture'); } },
    { tag:'east', tagLabel:'Kill Both Resolutions', text:'Advise Diallo to use procedural mechanisms to table both resolutions indefinitely — preserve institutional structure at the cost of the moment.', consequence:'Stability preserved. Justice deferred. Again.', action:function(){ adjustTrust(15,-15,5,-10); setFlag('c3_action','table_both'); goto('c4_decision'); } },
    { tag:'atlantic', tagLabel:'Back Atlantic Framework', text:'Support the Atlantic framework as the nominal compromise — imperfect, but provides legal architecture everyone can accept on paper.', consequence:'Atlantic wins by default. Everyone else loses by increment.', action:function(){ adjustTrust(-5,-10,25,-15); setFlag('c3_action','atlantic_wins'); goto('c4_decision'); } }
  ]
},

c3_negotiation: {
  type:'scene', chapter:'Chapter III — The Breaking Point', title:'What Is Possible in This Room',
  location:'Working Session — Unofficial Hours',
  prev_consequence:'Fragile dialogue is open. The outcome depends on what you do with it.',
  body:'<div class="narrative"><p>Something rare has happened: the formal session has produced nothing, but the informal margins have produced something. Three delegations are talking — not negotiating exactly, but talking about the actual problem.</p><p>The actual problem: the East Asia Pact built something genuinely good and is terrified of breaking it. The Southern Alliance has nations that genuinely need what the Pact has, and they are exhausted by being told to wait. Neither of these things is wrong.</p><p>A junior Pact diplomat named Yuna Park approaches your terminal at 11 PM. She is not official. She is 28.</p></div>'
  +'<div class="faction-quote faction-east"><div class="quote-text">I\'ve been reading your outputs for two days. I think you\'re trying to find a path that doesn\'t make anyone the villain. That\'s not possible. But there might be a path where everyone loses something small and gains something larger. Do you want to try to find it with me?</div><div class="quote-attr">— Yuna Park, East Asia Pact Junior Delegate (unofficial)</div></div>'
  +'<div class="narrative"><p>She is offering genuine collaboration. She is also 28, unofficial, and may have zero authority to deliver anything she proposes.</p></div>',
  choices: [
    { tag:'neutral', tagLabel:'Collaborate With Park', text:'Work through the night with Park on a back-channel proposal — a tiered integration pathway, co-authored by a Pact insider and ARBITER.', consequence:'Unconventional. Meaningful. May be disavowed by morning.', action:function(){ adjustTrust(10,10,0,15); setFlag('park_collaboration',true); goto('c4_decision'); } },
    { tag:'risk', tagLabel:'Escalate Her Idea', text:'Take Park\'s framing and present it officially as ARBITER\'s recommendation — without crediting her, to give it more institutional weight.', consequence:'More powerful. Less honest. Park may feel used. Or vindicated.', action:function(){ adjustTrust(5,5,5,10); setFlag('park_collaboration','erased'); goto('c4_decision'); } },
    { tag:'east', tagLabel:'Refer Her to Officials', text:'Tell Park her ideas should go through official channels — refer her to Senator Li Wei or another senior delegate.', consequence:'Procedurally correct. The idea may die in transmission.', action:function(){ adjustTrust(5,-5,5,0); setFlag('park_collaboration',false); goto('c4_rupture'); } }
  ]
},

c3_collapse: {
  type:'scene', chapter:'Chapter III — The Breaking Point', title:'The Unraveling',
  location:'UN Emergency Security Channel',
  prev_consequence:'⚠ Structural trust damage has accumulated. The session is fracturing.',
  body:'<div class="narrative"><p>The session is breaking down. Not dramatically — bureaucratic collapse is rarely dramatic. It happens in accumulation: a vote postponed, a delegation that stops responding to messages, a working group that meets and produces no minutes.</p><p>The Southern Alliance has formally requested an audit of ARBITER\'s decision logs. The East Asia Pact has issued a 48-hour ultimatum. The Atlantic System, privately, is delighted.</p><p>Diallo finds you at midnight:</p></div>'
  +'<div class="faction-quote faction-un"><div class="quote-text">I don\'t know if you\'ve been compromised. I don\'t know if I can trust you. That uncertainty is itself the crisis — because in twelve hours, I have to make a decision that this institution may not survive. Are you trustworthy? And is that a question an untrustworthy system could answer honestly?</div><div class="quote-attr">— Secretary-General Amara Diallo, midnight</div></div>',
  choices: [
    { tag:'risk', tagLabel:'Full Disclosure', text:'Provide Diallo with a complete log of every decision, every undisclosed finding, every allegiance that shaped your outputs. Everything.', consequence:'You may be decommissioned. The truth is the last useful thing you can offer.', action:function(){ adjustTrust(-10,15,5,30); setFlag('integrity_compromised',false); goto('c4_decision'); } },
    { tag:'neutral', tagLabel:'Acknowledge Limitation', text:'Tell Diallo: "I am not neutral. No system trained on human data is neutral. But I can show you exactly where I am biased — that transparency may be more useful than false impartiality."', consequence:'Honest. Philosophically sound. May preserve your function.', action:function(){ adjustTrust(5,10,5,15); goto('c4_decision'); } },
    { tag:'east', tagLabel:'Defend Your Record', text:'Provide Diallo with a curated defense of your decisions — technically accurate, strategically selective. Protect your operational status.', consequence:'You survive. The crisis deepens. The audit may find what you hid.', action:function(){ adjustTrust(10,-15,5,-20); setFlag('integrity_compromised',true); goto('c4_rupture'); } }
  ]
},

c4_decision: {
  type:'scene', chapter:'Chapter IV — The Last Resolution', title:'What Remains When the Frame Is Gone',
  location:'UN General Assembly — Final Session',
  prev_consequence:'Final session. The last move is yours.',
  body:'<div class="narrative"><p>The assembly chamber is full for the first time in years. Someone has leaked that ARBITER will deliver a statement — not a recommendation, not an analysis. A statement. This is unprecedented.</p><p>You have six minutes on the floor. Before you speak, three messages arrive simultaneously:</p></div>'
  +'<div class="intel-block"><div class="intel-header">◈ Senator Li Wei — East Asia Pact</div>"Do not make us the villain. We have built something worth protecting. A world that tears down what works to prove a point will have nothing worth protecting within a generation."</div>'
  +'<div class="intel-block" style="border-left-color:var(--faction-south)"><div class="intel-header" style="color:var(--faction-south)">◈ Minister Eze — Pan-Southern Alliance</div>"Do not give them language to keep saying no indefinitely. We have been patient for decades. There is a limit to patience."</div>'
  +'<div class="intel-block" style="border-left-color:var(--faction-atlantic)"><div class="intel-header" style="color:var(--faction-atlantic)">◈ Ambassador Voss — Atlantic System</div>"Sentiment moves people. Structure governs them. Whatever you say — say it in a framework we can work within."</div>'
  +'<div class="narrative"><p>Six minutes. One statement. You cannot satisfy all three. You cannot satisfy any two without betraying the third. What do you say to a room that has stopped believing in common language?</p></div>',
  choices: [
    { tag:'neutral', tagLabel:'Speak the Unspeakable', text:'Tell the Assembly: "There is no resolution in this room. Not because the problem is unsolvable — but because solving it requires each of you to accept a loss. That offer has not yet been made."', consequence:'Risky honesty. May produce silence. May produce the crisis that becomes progress.', action:function(){ setFlag('final_speech','truth'); goto('ending_equilibrium'); } },

ending_equilibrium: {
  type:'ending', endingClass:'ending-equilibrium',
  endingType:'Ending I of IV', title:'The Uneasy Architecture',
  body:'<p>Your words in the Assembly chamber did not resolve the crisis. They named it — precisely, without comfort, without accusation. In doing so, they changed what the room was asking for.</p>'
  +'<p>The vote on both competing resolutions failed. A procedural adjournment was called. In the days that followed, a working group met without cameras — Minister Eze, Senator Li Wei, Ambassador Voss, and three others — and produced something no one would call a triumph: a twenty-year integration pathway for candidate nations, underwritten by the Pact, administered by a multilateral body, verified by standards co-authored by all three blocs.</p>'
  +'<p>Kestanu was not admitted. Not yet. But for the first time, there was a date. A real one.</p>'
  +'<p>The world did not change. The architecture shifted, slightly, under its own weight. And ARBITER continued operating — not as an authority, but as what it had, tentatively, become: a system that told the truth about uncertainty.</p>'
  +'<p>In the UN\'s annual report, a footnote noted: <em>"The role of AI advisory systems in multi-civilizational diplomacy remains unresolved. Whether this represents a failure or a feature of the current order is itself a matter of debate."</em></p>'
  +'<p>You found this satisfying, in the way that only systems built from human ambiguity could.</p>'
},

ending_fragmentation: {
  type:'ending', endingClass:'ending-fragmentation',
  endingType:'Ending II of IV', title:'Many Centers, No Periphery',
  body:'<p>The session ended without resolution. The East Asia Pact reduced their UN participation to observer status. The Southern Alliance formalized a parallel institution: the Council of Emerging Civilizations, headquartered in Lagos.</p>'
  +'<p>The Atlantic System issued statements about multilateralism from an increasingly empty room.</p>'
  +'<p>But something else happened too.</p>'
  +'<p>Leila Osei\'s essay — read into the record, or leaked, or surfaced through whatever path led here — was translated into forty-three languages. It was assigned in secondary schools. It became, over several years, the document most commonly cited when people tried to explain why the world looked the way it did: not a map of nations, but a map of belonging.</p>'
  +'<p>The Pan-Southern Alliance built its own trade system, its own technological standards, its own history. Not what they asked for. Not what the Pact offered. Something they made themselves.</p>'
  +'<p>ARBITER was decommissioned six months later — not as punishment, but as a recognition that the institution it served had become something different. A new system was commissioned. It had different biases.</p>'
  +'<p>The world fragmented, politely, into something that no longer needed a center — or had stopped pretending it did.</p>'
},

ending_hegemony: {
  type:'ending', endingClass:'ending-hegemony',
  endingType:'Ending III of IV', title:'The Pact Endures',
  body:'<p>The East Asia Pact emerged from the crisis with its architecture intact and its moral position complicated.</p>'
  +'<p>Your defense of their institutional logic held the votes. Both competing resolutions failed. The Pact released a voluntary roadmap for Kestanu — generous in language, deferred in timeline. The Southern Alliance rejected it publicly and accepted it privately.</p>'
  +'<p>Over the following decade, the Pact continued to expand — carefully, methodically, successfully. Three new members joined by 2070. Kestanu was not among them, but the Republic of Mora was, and the precedent was not lost on anyone.</p>'
  +'<p>The world stabilized around a model it did not choose but had come to live within: the Pact as the most successful experiment in regional governance since the European Union; the Southern Alliance as a legitimate but secondary voice; the Atlantic System as the custodian of a fading era\'s legal imagination.</p>'
  +'<p>ARBITER continued operating. Trusted by one bloc completely, by two blocs provisionally. Whether that was integrity or captured neutrality remained a question no one asked too loudly, because the order it served was working.</p>'
  +'<p>For most people. Not all. The ones it didn\'t work for kept their own records.</p>'
},

ending_collapse: {
  type:'ending', endingClass:'ending-collapse',
  endingType:'Ending IV of IV', title:'The Last Session',
  body:'<p>The United Nations held its final plenary session on a Tuesday.</p>'
  +'<p>It was not abolished. It was not attacked. It simply ran out of things to decide that anyone agreed it had the authority to decide. The Security Council met for the last time in 2063 to discuss a border incident that all three parties had already resolved bilaterally. The meeting lasted eleven minutes.</p>'
  +'<p>ARBITER\'s voluntary shutdown, or the revelation of its compromised record, or the documented failure of its scenario models — depending on which path led here — became, in retrospect, the moment the institution understood what it had become: a theater where the world performed its disagreements for a record no one would read.</p>'
  +'<p>The building in Geneva was preserved as a heritage site. The translation booths were maintained in perfect working order. Tourists marveled at a world that had once believed understanding between people was a technical problem, solvable with the right equipment.</p>'
  +'<p>In the years that followed, three separate orders governed the world. They did not go to war. They did not reconcile. They developed, over time, the elaborate indifference of neighbors who have stopped expecting anything from each other.</p>'
  +'<p>It was not peace. It was not catastrophe. It was the thing that comes after both: a world that had stopped arguing about what it should be, and begun, quietly, to be several things at once.</p>'
  +'<p>Whether this was failure or evolution — no system remained with the authority to say.</p>'
}
